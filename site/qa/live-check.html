<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>live.ts — QA harness (R5, Fluidez B)</title>
  </head>
  <body>
    <!--
      QA harness for src/live.ts (R5, D-24) — see qa/live-check.mjs's header
      comment for why this exists as a page instead of a vitest suite (site/
      has no test runner today; this follows the same "drive it for real
      in Chromium" convention as screenshot.mjs/oficinas-screenshot.mjs).

      Imports the REAL site/src/live.ts unmodified and drives it with a
      scripted `fetch` (never the network) plus a fake `documentRef` for the
      visibility scenario. Every scenario is a plain assertion against
      observable behaviour (fetch call counts/URLs/headers, onWorld/onStatus
      callback payloads) — never a peek at live.ts's private state.

      Timing: assertions that check "did we JUST reach N calls" use
      waitUntil() (poll every 5ms) and assert immediately on the same tick
      the condition becomes true — synchronous JS guarantees nothing else
      can run between the check and the assert, so these are not racy
      regardless of the exact interval values. Assertions that check "did
      nothing happen" use a plain sleep for a duration comfortably shorter
      than the next scheduled cycle.

      live-check.mjs reads #log's textContent and #done's data-status/
      data-summary once data-status leaves "running".
    -->
    <pre id="log"></pre>
    <div id="done" data-status="running"></div>
    <script type="module">
      import { startLivePolling } from '/src/live.ts';

      const logEl = document.getElementById('log');
      const doneEl = document.getElementById('done');
      const lines = [];
      function log(line) {
        lines.push(line);
        logEl.textContent = lines.join('\n');
      }

      let pass = 0;
      let fail = 0;
      function assert(cond, desc) {
        if (cond) {
          pass++;
          log(`PASS — ${desc}`);
        } else {
          fail++;
          log(`FAIL — ${desc}`);
        }
      }

      // Global net for the whole harness run: startLivePolling's cycles run as
      // `void runCycle()`, so a throw escaping live.ts's own error handling
      // would surface HERE as an unhandled promise rejection (and, before the
      // PR #43 review fix, also silently kill the loop). Scenarios 4b/4c
      // assert this stays at zero; any scenario tripping it also fails loudly.
      let rejectionCount = 0;
      window.addEventListener('unhandledrejection', (ev) => {
        rejectionCount++;
        log(`UNHANDLED REJECTION: ${ev.reason}`);
      });

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      /** Polls `cond` every `stepMs` until true or `timeoutMs` elapses. Returns as soon as `cond` is true - no further await between that check and the caller's next line, so a follow-up assert reading the same state is never racy. */
      async function waitUntil(cond, timeoutMs, stepMs = 5) {
        const deadline = Date.now() + timeoutMs;
        while (!cond()) {
          if (Date.now() >= deadline) return false;
          await sleep(stepMs);
        }
        return true;
      }

      function makeWorld(tickCount) {
        return {
          meta: { name: 'Mundo de teste', seed: 'qa-seed', tickCount, worldTime: tickCount * 10 },
          width: 2,
          height: 2,
          tiles: [{ biome: 'meadow' }, { biome: 'meadow' }, { biome: 'meadow' }, { biome: 'meadow' }],
          players: {},
          events: [],
        };
      }

      // --- Scenario 1: Camada B ETag/304 — free no-op on 304, real diff fires onWorld,
      // and the un-ETagged first read (identical to the seeded baseline) does NOT
      // spuriously fire it either (see live.ts's module doc on why the compare isn't
      // "200 always means changed"). Cycles spaced generously (300ms) so each
      // waitUntil() checkpoint has a wide, unambiguous window to land in. ---
      async function testEtag304() {
        log('\n--- Camada B: ETag / 304 ---');
        localStorage.setItem('nos_token', 'tok-etag');
        let calls = 0;
        const seenIfNoneMatch = [];
        const worlds = [];
        const fetchFn = async (url, init) => {
          calls++;
          seenIfNoneMatch.push(init?.headers?.['If-None-Match'] ?? null);
          if (calls === 1) {
            // No stored ETag yet - always 200, but content == the seeded baseline.
            return new Response(JSON.stringify(makeWorld(5)), {
              status: 200,
              headers: { etag: 'W/"abc"', 'x-ratelimit-remaining': '4999' },
            });
          }
          if (calls === 2) {
            return new Response(null, { status: 304, headers: { 'x-ratelimit-remaining': '4998' } });
          }
          return new Response(JSON.stringify(makeWorld(6)), {
            status: 200,
            headers: { etag: 'W/"def"', 'x-ratelimit-remaining': '4997' },
          });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: (w) => worlds.push(w),
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 300, backoff: 300, anon: 300 },
        });

        assert(await waitUntil(() => calls >= 1, 1000), 'primeiro ciclo consulta a Contents API');
        assert(calls === 1, 'ainda não passou do primeiro ciclo neste checkpoint');
        assert(seenIfNoneMatch[0] === null, 'primeira chamada não manda If-None-Match (sem ETag salvo ainda)');
        assert(worlds.length === 0, '200 idêntico ao mundo semeado (batida 5) não dispara onWorld');

        assert(await waitUntil(() => calls >= 2, 1000), 'segundo ciclo consulta de novo');
        assert(calls === 2, 'ainda não passou do segundo ciclo neste checkpoint');
        assert(seenIfNoneMatch[1] === 'W/"abc"', 'segunda chamada manda If-None-Match com o ETag da primeira resposta');
        assert(worlds.length === 0, '304 não dispara onWorld');

        assert(await waitUntil(() => worlds.length >= 1, 1000), 'terceiro ciclo (conteúdo novo) chega e dispara onWorld');
        assert(worlds.length === 1 && worlds[0].meta.tickCount === 6, 'onWorld recebe a batida nova (6)');

        handle.stop();
        localStorage.removeItem('nos_token');
      }

      // --- Scenario 2: 401 downgrades to Camada C within the SAME cycle, and stays
      // downgraded for subsequent cycles (never retries the Contents API with the
      // same bad token). ---
      async function testAuthDowngrade() {
        log('\n--- Camada B -> C: 401 rebaixa a camada ---');
        localStorage.setItem('nos_token', 'tok-bad');
        let apiCalls = 0;
        let rawCalls = 0;
        const statuses = [];
        const fetchFn = async (url) => {
          const u = String(url);
          if (u.includes('api.github.com')) {
            apiCalls++;
            return new Response(JSON.stringify({ message: 'Bad credentials' }), { status: 401 });
          }
          rawCalls++;
          return new Response(JSON.stringify(makeWorld(5)), { status: 200 });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: (s) => statuses.push(s),
          fetchFn,
          intervals: { initial: 10, normal: 300, backoff: 300, anon: 200 },
        });

        assert(await waitUntil(() => rawCalls >= 1, 1000), '401 cai para a Camada C dentro do mesmo ciclo');
        assert(apiCalls === 1, 'primeira tentativa foi para a Contents API (Camada B, token presente)');
        assert(rawCalls === 1, 'exatamente 1 leitura de fallback aconteceu neste ciclo');
        // `rawCalls` increments inside fetchFn, BEFORE touchAndEmit pushes the
        // status - wait on the status condition itself (not a proxy counter)
        // so this can never read a stale value.
        assert(await waitUntil(() => statuses.at(-1)?.tier === 'c', 1000), 'status informado ao HUD já é "c" neste ciclo');

        assert(await waitUntil(() => rawCalls >= 2, 1000), 'ciclo seguinte também usa a Camada C');
        assert(apiCalls === 1, 'ciclo seguinte NÃO tenta a Contents API de novo com o mesmo token');

        handle.stop();
        localStorage.removeItem('nos_token');
      }

      // --- Scenario 3: x-ratelimit-remaining below the safety margin slows Camada B
      // down to the backoff cadence instead of the normal one - sampled over a fixed
      // window (this is a "how many happened", not a "did we cross N" check). ---
      async function testRateLimitBackoff() {
        log('\n--- Camada B: recuo defensivo (x-ratelimit-remaining < 100) ---');
        localStorage.setItem('nos_token', 'tok-rl');
        let calls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(null, { status: 304, headers: { 'x-ratelimit-remaining': '42' } });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 40, backoff: 400, anon: 9999 },
        });
        await sleep(650); // at the 40ms "normal" cadence this would be ~16 calls; backed off (400ms) it should land on exactly 2
        handle.stop();
        assert(calls === 2, `remaining=42 força o intervalo de recuo (esperado 2 chamadas em 650ms, veio ${calls})`);
        localStorage.removeItem('nos_token');
      }

      // --- Scenario 3b (PR #43 review MUST FIX, regression): 403 with a
      // DATE-form Retry-After (RFC 7231-legal; Number() of it is NaN). Before
      // the fix: Math.max(backoff, NaN) = NaN → setTimeout(fn, NaN) fires
      // immediately → same 403 → unbounded hot loop (~121 req/500ms measured
      // by the reviewer driving this very module; the rate-limit 403 path
      // never sets badToken, so it stays on Camada B and hammers). Now the
      // NaN must degrade to the backoff cadence: at most 2 requests in this
      // 500ms window (one at ~10ms, the next only at ~410ms). ---
      async function testDateFormRetryAfter() {
        log('\n--- 403 com Retry-After em forma de data não vira hot loop ---');
        localStorage.setItem('nos_token', 'tok-ra-date');
        let calls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify({ message: 'rate limited' }), {
            status: 403,
            headers: { 'retry-after': 'Wed, 21 Oct 2026 07:28:00 GMT' },
          });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 60, backoff: 400, anon: 400 },
        });
        await sleep(500);
        handle.stop();
        assert(calls >= 1, 'a primeira consulta aconteceu');
        assert(calls <= 2, `sem hot loop: no máximo 2 consultas em 500ms com recuo de 400ms (veio ${calls})`);
        assert(rejectionCount === 0, 'nenhuma promise rejection não-tratada');
        localStorage.removeItem('nos_token');
      }

      // --- Scenario 3c (same NaN family, the other header): 403 +
      // x-ratelimit-remaining:0 with a GARBAGE x-ratelimit-reset. Same
      // failure mode via our own reset-time arithmetic (NaN*1000 - now →
      // NaN → setTimeout(NaN)); must degrade to the backoff cadence too. ---
      async function testGarbageRateLimitReset() {
        log('\n--- 403 com x-ratelimit-reset ilegível não vira hot loop ---');
        localStorage.setItem('nos_token', 'tok-reset-garbage');
        let calls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify({ message: 'rate limited' }), {
            status: 403,
            headers: { 'x-ratelimit-remaining': '0', 'x-ratelimit-reset': 'not-a-number' },
          });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 60, backoff: 400, anon: 400 },
        });
        await sleep(500);
        handle.stop();
        assert(calls >= 1, 'a primeira consulta aconteceu');
        assert(calls <= 2, `sem hot loop: no máximo 2 consultas em 500ms com recuo de 400ms (veio ${calls})`);
        assert(rejectionCount === 0, 'nenhuma promise rejection não-tratada');
        localStorage.removeItem('nos_token');
      }

      // --- Scenario 4: a body that doesn't look like a World (minimal shape check)
      // is logged and skipped, never reaches onWorld, never throws. ---
      async function testShapeValidation() {
        log('\n--- validação mínima de formato ---');
        let calls = 0;
        const worlds = [];
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify({ message: 'rate limit exceeded' }), { status: 200 });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: (w) => worlds.push(w),
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 9999, backoff: 9999, anon: 9999 },
        });
        assert(await waitUntil(() => calls >= 1, 1000), 'buscou (Camada C, sem login)');
        await sleep(30); // give a would-be errant onWorld a moment to fire before we check
        handle.stop();
        assert(calls === 1, 'só uma leitura aconteceu neste checkpoint');
        assert(worlds.length === 0, 'corpo sem o formato mínimo de World nunca dispara onWorld');
      }

      // --- Scenario 4b (PR #43 review MUST FIX, regression): a corrupt-but-
      // PLAUSIBLE body — valid top-level shape, but a Native missing
      // `position`. Before the fix this passed the shallow check, reached
      // onWorld, threw inside a renderer (nativos.ts reads native.position.x
      // unguarded), and the escaped throw skipped scheduleNext — polling loop
      // DEAD plus an unhandled rejection, re-dying on every restart while the
      // CDN served that body. Now the entity-level check rejects it BEFORE
      // onWorld, and the loop must keep beating cycle after cycle. ---
      async function testCorruptEntityBody() {
        log('\n--- corpo plausível-mas-corrompido (Nativo sem position) não mata o loop ---');
        let calls = 0;
        const worlds = [];
        const fetchFn = async () => {
          calls++;
          const corrupt = makeWorld(9);
          // The exact hole from the review: entity present, position absent.
          corrupt.natives = { gota: { id: 'gota', name: 'Gota', inventory: {} } };
          return new Response(JSON.stringify(corrupt), { status: 200 });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: (w) => worlds.push(w),
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 80, backoff: 80, anon: 80 },
        });
        assert(
          await waitUntil(() => calls >= 3, 2000),
          'o loop continua batendo ciclo após ciclo (scheduleNext sempre roda)',
        );
        assert(worlds.length === 0, 'onWorld NUNCA recebe o corpo corrompido (rejeitado pela checagem de entidades)');
        assert(rejectionCount === 0, 'nenhuma promise rejection não-tratada');
        handle.stop();
      }

      // --- Scenario 4c (PR #43 review MUST FIX, the other layer): the onWorld
      // callback itself throws, on a world the shape check can't fault (a
      // renderer bug, or corruption deeper than the entity checks look). The
      // isolation inside consumeWorldResponse must contain it: loop alive, no
      // unhandled rejection — and the SAME body must not re-fire the callback
      // (signature already recorded; main.ts swaps its world reference before
      // painting, so re-firing would just re-throw identically every cycle). ---
      async function testOnWorldThrowIsolated() {
        log('\n--- callback onWorld lançando exceção não mata o loop ---');
        let calls = 0;
        let onWorldCalls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify(makeWorld(7)), { status: 200 }); // genuinely new vs the seeded tick 5
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {
            onWorldCalls++;
            throw new Error('bug de renderização (simulado)');
          },
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 80, backoff: 80, anon: 80 },
        });
        assert(await waitUntil(() => calls >= 3, 2000), 'o loop continua batendo depois do throw do callback');
        assert(onWorldCalls === 1, 'o mesmo corpo não re-dispara o callback (assinatura já registrada)');
        assert(rejectionCount === 0, 'nenhuma promise rejection não-tratada');
        handle.stop();
      }

      // --- Scenario 5: visibility pause/resume — no fetch while hidden, immediate
      // fetch (not a stale timer) the moment it becomes visible again. ---
      async function testVisibilityPause() {
        log('\n--- pausa/retomada por visibilidade da aba ---');
        let calls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify(makeWorld(5)), { status: 200 });
        };
        let visibilityState = 'visible';
        let listener = null;
        const documentRef = {
          get visibilityState() {
            return visibilityState;
          },
          addEventListener: (type, fn) => {
            if (type === 'visibilitychange') listener = fn;
          },
          removeEventListener: () => {
            listener = null;
          },
        };
        const statuses = [];
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: (s) => statuses.push(s),
          fetchFn,
          documentRef,
          intervals: { initial: 10, normal: 300, backoff: 300, anon: 300 },
        });

        assert(await waitUntil(() => calls >= 1, 1000), 'primeira leitura acontece normalmente');
        const callsAtPause = calls;
        visibilityState = 'hidden';
        listener?.();
        assert(statuses.at(-1)?.paused === true, 'status informa paused=true assim que a aba fica oculta');

        await sleep(250); // well short of the next 300ms-spaced cycle, which is cancelled anyway
        assert(calls === callsAtPause, 'nenhuma busca nova acontece enquanto a aba está oculta');

        visibilityState = 'visible';
        listener?.();
        assert(await waitUntil(() => calls > callsAtPause, 1000), 'retoma com uma busca IMEDIATA ao voltar a ficar visível (não espera o timer antigo)');
        // Same reasoning as the Camada C downgrade check above: `calls`
        // increments inside fetchFn before touchAndEmit pushes the resumed
        // (paused:false) status - wait on the status itself.
        assert(await waitUntil(() => statuses.at(-1)?.paused === false, 1000), 'status informa paused=false após retomar');

        handle.stop();
      }

      // --- Scenario 6: a persistently failing poll must never fake freshness —
      // `lastCheckedAt` only advances on a CONFIRMED read (304 or a parsed 200),
      // never on a network error, so "atualizado há Xs" can't lie by resetting
      // to "agora" every failed cycle (regression test for a bug caught while
      // building this QA harness — see live.ts's module doc, "Honesty of
      // LiveStatus.lastCheckedAt"). Multiple failed cycles must still each
      // re-emit status (so the HUD's tier badge stays live), just without
      // moving the freshness clock. ---
      async function testFailedPollDoesNotFakeFreshness() {
        log('\n--- honestidade: falha de rede não finge frescor ---');
        let calls = 0;
        const statuses = [];
        const fetchFn = async () => {
          calls++;
          throw new Error('network down (simulado)');
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: (s) => statuses.push(s),
          fetchFn,
          intervals: { initial: 10, normal: 60, backoff: 60, anon: 60 },
        });

        const seededCheckedAt = statuses[0]?.lastCheckedAt;
        assert(typeof seededCheckedAt === 'number', 'status inicial (síncrono) já traz um lastCheckedAt semeado');

        assert(await waitUntil(() => calls >= 3, 2000), 'a busca falhou e foi tentada de novo pelo menos 3 vezes');
        assert(
          statuses.length >= 4, // seed + 3 failed attempts
          `cada tentativa falha re-emite status mesmo assim (${statuses.length} emissões para ${calls} tentativas)`,
        );
        assert(
          statuses.every((s) => s.lastCheckedAt === seededCheckedAt),
          'lastCheckedAt NUNCA avança numa falha de rede — continua igual ao valor semeado em todas as emissões',
        );
        assert(
          statuses.every((s) => s.lastChangedAt === null),
          'lastChangedAt também nunca avança (nada foi confirmado)',
        );

        handle.stop();
      }

      // --- Scenario 7: refreshNow() bypasses whatever timer is pending. ---
      async function testRefreshNow() {
        log('\n--- refreshNow() ignora o timer pendente ---');
        let calls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify(makeWorld(5)), { status: 200 });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 9999, normal: 9999, backoff: 9999, anon: 9999 },
        });
        await sleep(30);
        assert(calls === 0, 'nada ainda (o intervalo inicial de 9999ms não passou)');
        handle.refreshNow();
        assert(await waitUntil(() => calls >= 1, 1000), 'refreshNow() dispara uma busca imediatamente');
        handle.stop();
      }

      // --- Scenario 8: stop() actually halts the loop. ---
      async function testStop() {
        log('\n--- stop() encerra o loop ---');
        let calls = 0;
        const fetchFn = async () => {
          calls++;
          return new Response(JSON.stringify(makeWorld(5)), { status: 200 });
        };
        const handle = startLivePolling({
          initialWorld: makeWorld(5),
          onWorld: () => {},
          onStatus: () => {},
          fetchFn,
          intervals: { initial: 10, normal: 300, backoff: 300, anon: 300 },
        });
        assert(await waitUntil(() => calls >= 1, 1000), 'a primeira leitura acontece');
        const callsAtStop = calls;
        handle.stop();
        await sleep(250); // well short of the next 300ms-spaced cycle
        assert(calls === callsAtStop, 'nenhuma busca nova acontece depois de stop()');
      }

      async function run() {
        await testEtag304();
        await testAuthDowngrade();
        await testRateLimitBackoff();
        await testDateFormRetryAfter();
        await testGarbageRateLimitReset();
        await testShapeValidation();
        await testCorruptEntityBody();
        await testOnWorldThrowIsolated();
        await testVisibilityPause();
        await testFailedPollDoesNotFakeFreshness();
        await testRefreshNow();
        await testStop();

        doneEl.dataset.status = fail === 0 ? 'pass' : 'fail';
        doneEl.dataset.summary = `${pass} pass, ${fail} fail`;
        log(`\nTOTAL: ${pass} pass, ${fail} fail`);
      }

      run().catch((err) => {
        log(`\nERRO NO HARNESS: ${err instanceof Error ? err.stack : String(err)}`);
        doneEl.dataset.status = 'fail';
        doneEl.dataset.summary = `harness threw: ${String(err)}`;
      });
    </script>
  </body>
</html>
