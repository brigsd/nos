<!doctype html>
<!-- Preview dos estados do live-indicator (R5, QA): cada estado do indicador renderizado estático. -->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>live-indicator.ts — states preview (R5, QA only)</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      /*
       * Layout for THIS PREVIEW ONLY - not shipped, not part of the game UI,
       * never imported by main.ts/index.html. Real game chrome uses .hud-panel
       * positioned absolutely inside #hud; here it's laid out as a plain
       * static list so every state is visible in one screenshot at once.
       */
      body {
        background: var(--nos-bg);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-family: var(--nos-font);
      }
      .preview-row {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .preview-label {
        color: var(--nos-text-dim);
        font: 11px 'Courier New', monospace;
        width: 210px;
        flex-shrink: 0;
      }
      .hud-panel {
        position: static;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <!--
      Honest disclaimer for anyone reading this file later: this page does
      NOT drive src/live.ts or the network at all. It calls the REAL
      src/live-indicator.ts (unmodified) with hand-built LiveStatus objects,
      to show what each documented state actually paints - something the
      sandbox this was built in cannot capture live (no route to
      api.github.com from headless Chromium here, see qa/screenshot.mjs's
      header comment). qa/live-check.html/.mjs separately proves the TIER
      LOGIC itself (ETag/304, downgrade, backoff, pause/resume) against a
      mocked fetch; this page only proves the PAINT.
    -->
    <div class="preview-row">
      <span class="preview-label">tier: b (logado, ~3s)</span>
      <div class="hud-panel">
        <p class="live-indicator" id="live-b">
          <span class="live-dot" id="live-b-dot" aria-hidden="true"></span><span id="live-b-label">—</span>
        </p>
      </div>
    </div>
    <div class="preview-row">
      <span class="preview-label">tier: c (anônimo, ~60s)</span>
      <div class="hud-panel">
        <p class="live-indicator" id="live-c">
          <span class="live-dot" id="live-c-dot" aria-hidden="true"></span><span id="live-c-label">—</span>
        </p>
      </div>
    </div>
    <div class="preview-row">
      <span class="preview-label">pausado (aba em segundo plano)</span>
      <div class="hud-panel">
        <p class="live-indicator" id="live-p">
          <span class="live-dot" id="live-p-dot" aria-hidden="true"></span><span id="live-p-label">—</span>
        </p>
      </div>
    </div>
    <script type="module">
      import { renderLiveIndicator } from '/src/live-indicator.ts';

      // Each row gets its OWN renderLiveIndicator() call. Note for anyone
      // reusing this fixture: live-indicator.ts's 1s repaint ticker is a
      // module-level singleton (by design - main.ts only ever creates one),
      // so only the LAST row created keeps live-ticking its "há Xs" text if
      // this page is left open; the first paint of every row (all that a
      // single screenshot needs) is correct regardless, since paint() runs
      // synchronously inside the update call itself.
      const now = Date.now();

      const updateB = renderLiveIndicator({
        root: document.getElementById('live-b'),
        dot: document.getElementById('live-b-dot'),
        label: document.getElementById('live-b-label'),
      });
      updateB({ tier: 'b', paused: false, lastCheckedAt: now, lastChangedAt: now - 3000, tickCount: 41 });

      const updateC = renderLiveIndicator({
        root: document.getElementById('live-c'),
        dot: document.getElementById('live-c-dot'),
        label: document.getElementById('live-c-label'),
      });
      updateC({ tier: 'c', paused: false, lastCheckedAt: now - 47000, lastChangedAt: now - 190000, tickCount: 40 });

      const updateP = renderLiveIndicator({
        root: document.getElementById('live-p'),
        dot: document.getElementById('live-p-dot'),
        label: document.getElementById('live-p-label'),
      });
      updateP({ tier: 'c', paused: true, lastCheckedAt: now, lastChangedAt: null, tickCount: 41 });

      document.body.dataset.ready = 'true';
    </script>
  </body>
</html>
