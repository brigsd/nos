<script>
'use strict';
/* NÓS — gerador de árvores (L-system / ramificação recursiva + copa por campo
   de densidade). Determinístico por seed. Saída: buffer de índices da paleta
   Resurrect 64 (mesma do jogo), -1 = transparente. Núcleo puro, sem DOM —
   serve tanto ao estúdio (artifact) quanto, depois, ao asset do jogo. */

const PALETTE = ["#2e222f","#3e3546","#625565","#966c6c","#ab947a","#694f62","#7f708a","#9babb2","#c7dcd0","#ffffff","#6e2727","#b33831","#ea4f36","#f57d4a","#ae2334","#e83b3b","#fb6b1d","#f79617","#f9c22b","#7a3045","#9e4539","#cd683d","#e6904e","#fbb954","#4c3e24","#676633","#a2a947","#d5e04b","#fbff86","#165a4c","#239063","#1ebc73","#91db69","#cddf6c","#313638","#374e4a","#547e64","#92a984","#b2ba90","#0b5e65","#0b8a8f","#0eaf9b","#30e1b9","#8ff8e2","#323353","#484a77","#4d65b4","#4d9be6","#8fd3ff","#45293f","#6b3e75","#905ea9","#a884f3","#eaaded","#753c54","#a24b6f","#cf657f","#ed8099","#831c5d","#c32454","#f04f78","#f68181","#fca790","#fdcbb0"];

/* ramps: shadow2 -> shadow1 -> mid -> light -> hi (índices da paleta) */
const LEAF_RAMPS = {
  verao:     [29, 30, 31, 32, 33],   // #165a4c..#cddf6c — verde vivo
  outono:    [19, 20, 21, 23, 18],   // vinho..ouro
  primavera: [35, 36, 37, 38, 8],    // teal escuro..menta pálida
  mistica:   [44, 50, 51, 52, 53],   // índigo..lavanda (tema mítico-tecnológico)
  dia:       [29, 30, 31, 32, 27],   // BotW: sombra teal fria -> topo amarelo-verde ao sol
};
const LEAF_SPECK = { verao: 28, outono: 28, primavera: 33, mistica: 43, dia: 28 };  // brilho de folha ao sol / glint ciano
const BARK_RAMPS = {
  quente: [1, 19, 20, 21, 22],   // casca quente (carvalho/ancião)
  fria:   [1, 49, 54, 5, 6],     // casca fria/lilás (mística)
  conif:  [1, 24, 25, 5, 4],     // casca oliva (pinheiro)
  dia:    [1, 24, 3, 4, 63],     // marrom-acinzentado ao sol (ref. BotW)
  betula: [1, 6, 7, 8, 9],       // bétula: casca branca (marcas escuras à parte)
};
const OUTLINE = 0; // contorno de tinta: o preto do jogo (#2e222f)

/* rampas próprias de espécie (independem do humor) */
const SPECIES_RAMPS = {
  cereja:  [54, 55, 56, 57, 53],  // cerejeira: vinho -> rosa -> lavanda
  betula:  [29, 30, 31, 32, 33],  // bétula: verde solto
};
const SPECIES = {
  carvalho:  { len: 22, lenDecay: 0.79, width: 8,  widthDecay: 0.70, spread: 0.54, jitter: 0.34, upBias: 0.06, droop: 0.02, depth: 8, apicalLen: 0.82, latLen: 0.72, lateralN: 2, leafFrom: 3, leafR: [7, 12], gnarl: 0,    bark: 'quente' },
  anciao:    { len: 19, lenDecay: 0.81, width: 12, widthDecay: 0.75, spread: 0.72, jitter: 0.52, upBias: 0.02, droop: 0.05, depth: 7, apicalLen: 0.80, latLen: 0.74, lateralN: 2, leafFrom: 2, leafR: [6, 11], gnarl: 0.55, bark: 'quente' },
  salgueiro: { len: 21, lenDecay: 0.82, width: 6,  widthDecay: 0.73, spread: 0.34, jitter: 0.30, upBias: -0.10, droop: 0.20, depth: 9, apicalLen: 0.84, latLen: 0.74, lateralN: 2, leafFrom: 4, leafR: [4, 7],  gnarl: 0.1,  bark: 'quente' },
  pinheiro:  { len: 15, lenDecay: 0.87, width: 7,  widthDecay: 0.81, spread: 0.95, jitter: 0.20, upBias: 0.0,  droop: 0.30, depth: 9, apicalLen: 0.92, latLen: 0.52, lateralN: 2, leafFrom: 1, leafR: [3, 6],  gnarl: 0,    bark: 'conif', tiers: 5 },
  cerejeira: { len: 20, lenDecay: 0.80, width: 7,  widthDecay: 0.72, spread: 0.62, jitter: 0.40, upBias: 0.04, droop: 0.03, depth: 7, apicalLen: 0.80, latLen: 0.74, lateralN: 2, leafFrom: 3, leafR: [7, 11], gnarl: 0.2,  bark: 'quente', ramp: 'cereja' },
  florida:   { len: 20, lenDecay: 0.80, width: 7,  widthDecay: 0.72, spread: 0.60, jitter: 0.38, upBias: 0.05, droop: 0.02, depth: 7, apicalLen: 0.81, latLen: 0.73, lateralN: 2, leafFrom: 3, leafR: [7, 11], gnarl: 0.1,  bark: 'quente', blossoms: true },
  betula:    { len: 24, lenDecay: 0.80, width: 5,  widthDecay: 0.74, spread: 0.46, jitter: 0.34, upBias: 0.10, droop: 0.0,  depth: 7, apicalLen: 0.86, latLen: 0.70, lateralN: 2, leafFrom: 3, leafR: [5, 8],  gnarl: 0,    bark: 'betula', barkMarks: true },
  seca:      { len: 21, lenDecay: 0.80, width: 9,  widthDecay: 0.78, spread: 0.74, jitter: 0.5,  upBias: 0.0,  droop: 0.04, depth: 6, apicalLen: 0.82, latLen: 0.76, lateralN: 2, leafFrom: 2, leafR: [4, 6],  gnarl: 0.7,  bark: 'quente', noLeaves: true },
  arbusto:   { len: 8,  lenDecay: 0.78, width: 3,  widthDecay: 0.72, spread: 0.9,  jitter: 0.45, upBias: 0.0,  droop: 0.05, depth: 4, apicalLen: 0.78, latLen: 0.82, lateralN: 2, leafFrom: 3, leafR: [7, 10], gnarl: 0.2,  bark: 'quente' },
};

function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
/* ruído estável por pixel (quebra banding sem parecer chuvisco) */
function hash2(x, y) {
  let h = (x * 374761393 + y * 668265263) >>> 0;
  h = (h ^ (h >>> 13)) * 1274126177;
  return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
}
const BAYER = [
  [0, 8, 2, 10],
  [12, 4, 14, 6],
  [3, 11, 1, 9],
  [15, 7, 13, 5],
];
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);

/**
 * growTree(opts) -> { buf: Int16Array(W*H) de índices da paleta (-1 transp), W, H }
 * opts: { species, mood, seed, W, H, showSkeleton }
 */
function growTree(opts) {
  const S0 = SPECIES[opts.species] || SPECIES.carvalho;
  const mul = opts.sizeMul || 1;
  const S = { ...S0, len: S0.len * mul, width: Math.max(2, S0.width * mul), leafR: [S0.leafR[0] * mul, S0.leafR[1] * mul] };
  const W = opts.W || 104;
  const H = opts.H || 136;
  const rnd = mulberry32((opts.seed | 0) || 1);
  const leafRamp = S.ramp ? SPECIES_RAMPS[S.ramp] : (LEAF_RAMPS[opts.mood] || LEAF_RAMPS.verao);
  const barkRamp = S.bark === 'betula' ? BARK_RAMPS.betula : S.bark === 'conif' ? BARK_RAMPS.conif : opts.mood === 'mistica' ? BARK_RAMPS.fria : opts.mood === 'dia' ? BARK_RAMPS.dia : BARK_RAMPS[S.bark];
  const speck = LEAF_SPECK[opts.mood] ?? 28;
  const glow = opts.mood === 'mistica';

  const segs = [];
  const leaves = [];
  const baseX = W / 2 + (rnd() - 0.5) * 4;
  const baseY = H - 4;
  const UP = -Math.PI / 2;

  function grow(x, y, ang, len, wid, depth) {
    const x2 = x + Math.cos(ang) * len;
    const y2 = y + Math.sin(ang) * len;
    segs.push({ x1: x, y1: y, x2, y2, w: Math.max(1, wid) });
    const r = S.leafR[0] + rnd() * (S.leafR[1] - S.leafR[0]);
    if (depth <= 0 || len < 2.2) { leaves.push({ x: x2, y: y2, r }); return; }
    if (depth <= S.leafFrom) leaves.push({ x: x2, y: y2, r: r * 0.7 });

    // filho apical: segue quase reto (dominância apical), mais longo
    let aa = ang + (rnd() - 0.5) * S.jitter;
    aa += (UP - aa) * S.upBias;
    grow(x2, y2, aa, len * S.lenDecay * S.apicalLen, wid * S.widthDecay, depth - 1);

    // filhos laterais: abrem em leque, mais curtos
    for (let i = 0; i < S.lateralN; i++) {
      const side = i % 2 === 0 ? 1 : -1;
      let la = ang + side * S.spread + (rnd() - 0.5) * S.jitter * 1.5;
      la += (UP - la) * S.upBias * 0.5;
      la += S.droop; // gravidade / choro
      if (S.gnarl) la += (rnd() - 0.5) * S.gnarl;
      grow(x2, y2, la, len * S.lenDecay * S.latLen, wid * S.widthDecay * 0.82, depth - 1);
    }
  }
  if (S.tiers) {
    /* pinheiro da referência: tronco curto + camadas triangulares empilhadas,
       borda serrilhada, luz na esquerda de cada camada, sombra por baixo */
    const buf2 = new Int16Array(W * H).fill(-1);
    const put2 = (x, y, idx) => { x |= 0; y |= 0; if (x >= 0 && y >= 0 && x < W && y < H) buf2[y * W + x] = idx; };
    const ramp2 = S.ramp ? SPECIES_RAMPS[S.ramp] : (LEAF_RAMPS[opts.mood] || LEAF_RAMPS.verao);
    const la = ramp2.length - 1;
    const trunkW = Math.max(2, S.width * 0.6);
    const treeH = H * 0.82, topY = H - 6 - treeH;
    // tronco
    for (let y = H - 4; y > H - 4 - treeH * 0.22; y--) for (let o = -trunkW / 2; o <= trunkW / 2; o += 0.5) {
      const sfrac = o / (trunkW / 2);
      put2(baseX + o, y, barkRamp[clamp(3 - Math.round((sfrac + 1) * 1.4), 0, 4)]);
    }
    const n = S.tiers;
    for (let t = n - 1; t >= 0; t--) { // de baixo pra cima
      const frac = t / (n - 1);
      const yBase = H - 6 - treeH * (0.16 + 0.78 * frac);
      const halfW2 = (W * 0.30) * (1 - frac * 0.72) * (0.92 + rnd() * 0.16);
      const tierH = treeH * 0.30 * (1 - frac * 0.3);
      for (let yy = 0; yy <= tierH; yy++) {
        const rowFrac = yy / tierH;
        let rowHalf = halfW2 * (1 - rowFrac);
        rowHalf += (hash2((yy * 5) | 0, t * 17) - 0.5) * 3.4; // serrilha
        if (rowHalf <= 0) continue;
        for (let ox = -rowHalf; ox <= rowHalf; ox++) {
          const nx = ox / halfW2;
          let idx;
          if (nx < -0.62 + rowFrac * 0.18) idx = la;          // filete de sol
          else if (nx < 0.05) idx = la - 1;
          else idx = Math.max(1, la - 2);                     // lado da sombra
          if (yy < 2.2) idx = Math.max(0, la - 3);            // beirada de baixo funda
          put2(baseX + ox, yBase - yy, ramp2[idx]);
        }
      }
    }
    // contorno de tinta
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const v = buf2[y * W + x];
      if (v < 0 || v === OUTLINE) continue;
      if ((x > 0 && buf2[y * W + x - 1] < 0) || (x < W - 1 && buf2[y * W + x + 1] < 0) ||
          (y > 0 && buf2[(y - 1) * W + x] < 0) || (y < H - 1 && buf2[(y + 1) * W + x] < 0)) buf2[y * W + x] = OUTLINE;
    }

  /* ---- ATERRAMENTO: sombra de contato + franja de grama na base ----
     (o que cola a árvore no chão: a sombra assenta, a grama cobre o corte
     reto do contorno na linha do solo) */
  {
    // vão do tronco na base: varre as últimas linhas por pixels de casca
    let minX = W, maxX = -1;
    for (let y = H - 10; y < H; y++) for (let x = 0; x < W; x++) {
      if (buf2[y * W + x] >= 0) { if (x < minX) minX = x; if (x > maxX) maxX = x; }
    }
    if (maxX >= minX) {
      const cxg = (minX + maxX) / 2, span = Math.max(3, (maxX - minX) / 2);
      const shR = span * 1.25 + 2, shRy = Math.max(2, span * 0.38);
      const gy = H - 3.5;
      // sombra: miolo sólido, borda ditherada — só onde é transparente
      for (let y = (gy - shRy) | 0; y <= Math.min(H - 1, (gy + shRy) | 0); y++) {
        for (let x = Math.max(0, (cxg - shR) | 0); x <= Math.min(W - 1, (cxg + shR) | 0); x++) {
          const ex = (x - cxg) / shR, ey = (y - gy) / shRy;
          const e = ex * ex + ey * ey;
          if (e > 1 || buf2[y * W + x] >= 0) continue;
          if (e < 0.5) buf2[y * W + x] = 35;
          else if ((BAYER[y & 3][x & 3] / 16) < (1 - e) * 1.6) buf2[y * W + x] = 30;
        }
      }
      // franja de grama: lâminas POR CIMA do tronco/contorno/sombra
      const moodRamp = LEAF_RAMPS[opts.mood] || LEAF_RAMPS.verao;
      const blades = Math.max(5, (span * 1.9) | 0);
      for (let i = 0; i < blades; i++) {
        const hsh = hash2(i * 37 + ((opts.seed | 0) & 1023), 91);
        const bx = cxg + (hsh - 0.5) * (span * 1.7 + 6);
        const bh = 2 + hash2(i * 53, 17) * (2.5 + span * 0.22);
        const lean = (hash2(i * 71, 5) - 0.5) * 2.4;
        const tone = moodRamp[hash2(i * 13, 3) < 0.55 ? 1 : hash2(i, 9) < 0.5 ? 2 : 3];
        for (let k = 0; k <= bh; k++) {
          const t = k / bh;
          put2(bx + lean * t * t, H - 3 - k, tone);
          if (t < 0.4) put2(bx + 1 + lean * t * t, H - 3 - k, tone);
        }
      }
    }
  }
    return { buf: buf2, W, H, glow };
  }
  grow(baseX, baseY, UP + (rnd() - 0.5) * 0.1, S.len, S.width, S.depth);

  const buf = new Int16Array(W * H).fill(-1);
  const put = (x, y, idx) => {
    x |= 0; y |= 0;
    if (x < 0 || y < 0 || x >= W || y >= H) return;
    buf[y * W + x] = idx;
  };

  /* ---- casca v2: cilindro + TEXTURA 2D (estrias que serpenteiam ao longo,
     rachaduras horizontais, nós) + raiz alargando na base ---- */
  const Lx = -0.55, Ly = -0.83; // luz do alto-esquerda
  let segIx = 0;
  for (const s of segs) {
    const isTrunk = segIx === 0;
    segIx++;
    const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
    const dist = Math.hypot(dx, dy) || 1;
    const ux = dx / dist, uy = dy / dist;
    let pxn = -uy, pyn = ux;
    const litSign = pxn * Lx + pyn * Ly >= 0 ? 1 : -1;
    const steps = Math.ceil(dist) + 1;
    // nó da casca: só em segmento grosso, às vezes
    const hasKnot = s.w > 4.5 && hash2((s.x1 * 7) | 0, (s.y1 * 11) | 0) < 0.3;
    const knotT = 0.25 + hash2((s.x2 * 5) | 0, (s.y2 * 3) | 0) * 0.5;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const cx = s.x1 + dx * t, cy = s.y1 + dy * t;
      let halfW = s.w / 2;
      // raiz: os últimos passos do tronco alargam em curva
      if (isTrunk && t < 0.14) halfW *= 1 + (1 - t / 0.14) * 0.65;
      const along = (isTrunk ? i : i + 37 * segIx); // coordenada ao longo
      for (let o = -halfW; o <= halfW; o += 0.5) {
        const sfrac = (o / halfW) * litSign; // -1 luz .. +1 sombra
        let b5 = clamp(4 - Math.round((sfrac + 1) * 2), 0, 4);
        // estrias que SERPENTEIAM: o id da estria desliza com vnoise ao longo
        const wob = (vnoise(along * 0.11, Math.round(o * 2) * 1.7) - 0.5) * 2.2;
        const ridge = hash2(Math.round(o * 3 + wob) + 31, 0);
        if (ridge < 0.24) b5 = clamp(b5 - 1, 0, 4);
        else if (ridge > 0.9) b5 = clamp(b5 + 1, 0, 4);
        // rachaduras horizontais curtas (quebram o espichado)
        if (hash2(Math.round(along / 5), Math.round(o * 0.7) + 9) < 0.09 && (along % 5) < 1.2) b5 = Math.max(0, b5 - 2);
        put(cx + pxn * o, cy + pyn * o, barkRamp[b5]);
      }
      // nó: anel escuro com miolo claro
      if (hasKnot && Math.abs(t - knotT) < 0.5 / steps) {
        const kx = cx + pxn * halfW * 0.3, ky = cy + pyn * halfW * 0.3;
        for (let oy = -2; oy <= 2; oy++) for (let ox = -1.5; ox <= 1.5; ox += 0.5) {
          const rr = (ox * ox) / 2.25 + (oy * oy) / 4;
          if (rr > 1) continue;
          put(kx + ox, ky + oy, rr > 0.45 ? barkRamp[0] : barkRamp[3]);
        }
      }
    }
  }

  if (opts.showSkeleton) {
    for (const lf of leaves) put(lf.x, lf.y, LEAF_SPECK[opts.mood] ?? 28);
    return { buf, W, H };
  }

  /* vento: desloca os aglomerados de folha pro lado, mais forte no alto da
     copa — o TRONCO fica parado; 3 frames disso viram o balanço */
  if (opts.windAmt) {
    for (const lf of leaves) {
      const heightW = 0.5 + 1.3 * (1 - lf.y / H);
      lf.x += opts.windAmt * heightW * (0.7 + hash2(lf.x | 0, lf.y | 0) * 0.8);
    }
  }

  /* ---- contorno de tinta no tronco/galhos (ref.: sprite clássico) ---- */
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {

function vnoise(x, y) {

  const fx = x - xi, fy = y - yi;

  const a = hash2(xi, yi), b = hash2(xi + 1, yi), c = hash2(xi, yi + 1), d = hash2(xi + 1, yi + 1);

      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const g = c.getContext('2d');

/* tufo de graminha (objeto): lâminas em arco a partir da base; `lean` -1..1

function genTuft(seed, lean, flowery) {

  const put = (x, y, idx) => { x |= 0; y |= 0; if (x >= 0 && y >= 0 && x < Wt && y < Ht) buf[y * Wt + x] = idx; };
  const blades = 6 + (rnd() * 4) | 0;
  const baseX = Wt / 2, baseY = Ht - 1;
  for (let i = 0; i < blades; i++) {
    const t0 = i / (blades - 1);
    const bx = baseX + (t0 - 0.5) * (7 + rnd() * 3);
    const len = 8 + rnd() * 9;

    const bend = fan * 3 + lean * (2.2 + len * 0.22); // vento empurra as pontas

    const tip = rnd() < 0.35 ? 27 : 32;
    for (let k = 0; k <= len; k++) {
      const t = k / len;
      const x = bx + bend * t * t;
      const y = baseY - k * 0.92;
      put(x, y, t > 0.72 ? tip : tone);
      if (t < 0.3) put(x + 1, y, tone); // base mais grossa
    }
    if (flowery && i === (blades >> 1)) {
      const x = bx + bend, y = baseY - len * 0.92;
      const petal = [57, 18, 9][(rnd() * 3) | 0];
      put(x, y - 1, petal); put(x - 1, y, petal); put(x + 1, y, petal); put(x, y + 1, petal); put(x, y, 28);

/* céu panorâmico diurno em CAMADAS: base estática (gradiente puro — somos uma ILHA no céu) e
   duas camadas de cúmulos com parallax — longe deriva devagar, perto mais
   rápido; a montanha é marco do mundo e fica PARADA. */
const SKY_W = 1024, SKY_H = HALF;
const SKY_BASE = new Uint32Array(SKY_W * SKY_H);
const CLOUD_FAR = new Uint32Array(SKY_W * SKY_H);  // alpha 0 = furo
const CLOUD_NEAR = new Uint32Array(SKY_W * SKY_H);
{
  const px32 = (r, g, b) => (255 << 24) | (b << 16) | (g << 8) | r;
  const lerp = (a, b, t) => a + (b - a) * t;
  const mix = (c1, c2, t) => px32(lerp(c1[0], c2[0], t) | 0, lerp(c1[1], c2[1], t) | 0, lerp(c1[2], c2[2], t) | 0);
  const C = { 47: [77,155,230], 48: [143,211,255], 8: [199,220,208], 9: [255,255,255], 7: [155,171,178], 19: [122,48,69], 3: [150,108,108], 5: [105,79,98], 6: [127,112,138] };
  /* base: gradiente liso */
  for (let y = 0; y < SKY_H; y++) {
    const t = y / SKY_H;
    const row = t < 0.5 ? mix(C[47], C[48], t / 0.5) : t < 0.85 ? mix(C[48], C[8], (t - 0.5) / 0.35) : mix(C[8], C[9], (t - 0.85) / 0.15);
    for (let x = 0; x < SKY_W; x++) SKY_BASE[y * SKY_W + x] = row;
  }

  /* cúmulo pixel-art: união de "puffs" elípticos RECORTADA numa base achatada.
     O que faz parecer VOLUME (e não adesivo): (a) cada pixel é sombreado pelo
     SEU puff dominante — todo lóbulo ganha topo ao sol e barriga própria, a
     silhueta fica lobulada por dentro também; (b) 4 tons com transições
     DITHERADAS (nada de faixa reta); (c) rim fofo — a borda é roída por
     Bayer proporcional à cobertura, então o contorno respira. Ref. BotW. */
  function stampCloud(layer, rnd, cx, cy, w, h, faint) {
    const n = 6 + (rnd() * 4) | 0;
    const puffs = [];
    for (let i = 0; i < n; i++) {
      const t = n === 1 ? 0.5 : i / (n - 1);
      const centerBoost = 1 - Math.abs(t - 0.5) * 1.25; // miolo bem mais alto que as pontas
      puffs.push({
        px: cx + (t - 0.5) * w * 0.92 + (rnd() - 0.5) * w * 0.05,
        py: cy - h * (0.10 + 0.44 * centerBoost) - rnd() * h * 0.10,
        pr: h * (0.26 + rnd() * 0.16) * (0.6 + centerBoost * 0.55),
      });
    }
    const baseY = cy + h * 0.18;
    const x0 = Math.floor(cx - w * 0.62), x1 = Math.ceil(cx + w * 0.62);
    const y0 = Math.max(0, Math.floor(cy - h * 1.1)), y1 = Math.min(SKY_H - 1, Math.ceil(baseY));
    for (let y = y0; y <= y1; y++) {
      for (let xx = x0; xx <= x1; xx++) {
        /* cobertura = melhor puff; guarda o puff dominante pra sombrear */
        let cov = 0, best = null;
        for (const p of puffs) {
          const dx = (xx - p.px) / p.pr, dy = (y - p.py) / (p.pr * 0.72);
          const v = 1 - (dx * dx + dy * dy);
          if (v > cov) { cov = v; best = p; }
        }
        if (cov <= 0) continue;
        const x = ((xx % SKY_W) + SKY_W) % SKY_W; // panorama dá a volta
        const bay = BAYER[y & 3][x & 3] / 16;
        /* rim fofo: perto da borda, pixels caem por dither (silhueta lobulada) */
        if (cov < 0.16 && bay > cov / 0.16) continue;
        const fromBase = baseY - y;
        /* luz por PUFF: acima do centro do lóbulo = sol; abaixo = sombra dele */
        const dyL = (y - best.py) / (best.pr * 0.72); // -1 topo .. +1 barriga
        let t = 0.62 - dyL * 0.5 + cov * 0.18;        // altura local + gordura
        t += (bay - 0.5) * 0.16;                       // quebra as faixas em dither
        let c;
        if (fromBase < 2.5 - bay) {
          /* base achatada: lavanda suave (não cinza sujo), fundida por dither */
          c = [lerp(C[48][0], C[6][0], 0.45) | 0, lerp(C[48][1], C[6][1], 0.45) | 0, lerp(C[48][2], C[6][2], 0.45) | 0];
        } else if (t > 0.72) c = C[9];   // topo ao sol
        else if (t > 0.48) c = C[8];     // meia-luz (menta pálida)
        else c = C[48];                  // barriga à sombra (azul-pálido)
        if (faint) c = [lerp(c[0], C[48][0], 0.35) | 0, lerp(c[1], C[48][1], 0.35) | 0, lerp(c[2], C[48][2], 0.35) | 0];
        layer[y * SKY_W + x] = px32(c[0], c[1], c[2]);
      }
    }
  }
  const rf = mulberry32(777);
  for (let i = 0; i < 9; i++) stampCloud(CLOUD_FAR, rf, rf() * SKY_W, 10 + rf() * 26, 34 + rf() * 42, 10 + rf() * 8, true);
  const rn = mulberry32(4242);
  for (let i = 0; i < 5; i++) stampCloud(CLOUD_NEAR, rn, rn() * SKY_W, 22 + rn() * 30, 90 + rn() * 110, 22 + rn() * 14, false);
}

  const q = [];
  const at = (x, y) => (x < 0 || y < 0 || x >= world.w || y >= world.h) ? 'f' : NOS_DATA.tiles[y * world.w + x];
  for (let y = 0; y < world.h; y++) for (let x = 0; x < world.w; x++) {
    const w0 = at(x, y) === 'w';
    const nb = [at(x-1,y), at(x+1,y), at(x,y-1), at(x,y+1)].some((t) => (t === 'w') !== w0);
    if (nb) { shoreField[y * world.w + x] = 0.5; q.push(x, y); }
  }
  for (let h = 0; h < q.length; h += 2) {
    const x = q[h], y = q[h + 1], d = shoreField[y * world.w + x];

      if (shoreField[ny * world.w + nx] > d + 1) { shoreField[ny * world.w + nx] = d + 1; q.push(nx, ny); }

/* gerador de ILHA FLUTUANTE distante: topo de grama, barriga de rocha em
   cone irregular com estalactites, mini-árvores — e cachoeira ANIMADA
   despencando no vazio (3 frames em loop; frame só mexe nas listras). */
function genIsland(seed, frame) {
  const Wi = 150, Hi = 140;
  const rnd = mulberry32(seed * 7717 + 11);
  const buf = new Int16Array(Wi * Hi).fill(-1);
  const put = (x, y, i) => { x |= 0; y |= 0; if (x >= 0 && y >= 0 && x < Wi && y < Hi) buf[y * Wi + x] = i; };
  const cx = Wi / 2, topY = Hi * 0.22, halfW = Wi * (0.36 + rnd() * 0.08);
  const off = rnd() * 64;
  const surf = new Float32Array(Wi).fill(-1);
  const bot = new Float32Array(Wi).fill(-1);
  for (let x = 0; x < Wi; x++) {
    const nx = (x - cx) / halfW;
    if (nx < -1 || nx > 1) continue;
    surf[x] = topY + (vnoise(x * 0.09 + off, 3) - 0.5) * 6 + nx * nx * 7;
    const depth = (1 - Math.abs(nx)) * Hi * 0.42 * (0.5 + vnoise(x * 0.11 + off * 2, 9) * 0.8) + 6;
    bot[x] = surf[x] + depth;
  }
  for (let x = 0; x < Wi; x++) {
    if (surf[x] < 0) continue;
    const nx = (x - cx) / halfW;
    for (let y = surf[x] | 0; y <= Math.min(Hi - 4, bot[x]); y++) {
      const d = y - surf[x];
      let idx;
      if (d < 2.5) idx = 27;                    // capa de grama ao sol
      else if (d < 4.5) idx = 31;               // grama de lado
      else if (d < 7.5) idx = 24;               // terra
      else {
        const t = (y - surf[x]) / Math.max(1, bot[x] - surf[x]);
        const fac = Math.floor(fbm(x / 9 + off, y / 9 + off, 2) * 3) / 3;
        const sh2 = 0.62 - t * 0.42 + (fac - 0.5) * 0.5 - Math.max(0, nx) * 0.25;
        idx = [1, 2, 6, 7][clamp(Math.round(sh2 * 3), 0, 3)];
      }
      put(x, y, idx);
    }
    // estalactites de rocha
    if (hash2(x * 3, seed & 511) < 0.05 && bot[x] > 0) {
      const len = 3 + hash2(x * 7, 9) * 7;
      for (let k = 0; k < len; k++) put(x, bot[x] + k, k > len - 2.5 ? 1 : 2);
    }
  }

  const nT = 2 + (rnd() * 3 | 0);
  for (let i = 0; i < nT; i++) {
    const bx = (cx + (rnd() - 0.5) * halfW * 1.3) | 0;
    if (bx < 0 || bx >= Wi || surf[bx] < 0) continue;
    const r = 4 + rnd() * 4, by = surf[bx] - r - 2;
    put(bx, surf[bx] - 1, 24); put(bx, surf[bx] - 2, 24);
    for (let oy = -r; oy <= r; oy++) for (let ox = -r; ox <= r; ox++) {
      if (ox * ox + oy * oy > r * r) continue;
      put(bx + ox, by + oy, oy < -r * 0.25 ? 32 : ox < 0 ? 31 : 30);
    }
  }
  // cachoeira em loop (seed par): listras brancas/cianas caindo + dissipação
  if ((seed & 1) === 0) {
    const wx = (cx + (rnd() - 0.5) * halfW * 0.7) | 0;
    const w2 = 2 + (rnd() * 2 | 0);
    const y0 = (surf[wx] || topY) + 1;
    for (let y = y0; y < Hi - 1; y++) {
      const fade = (y - Hi * 0.7) / (Hi * 0.3);
      for (let ox = -w2; ox <= w2; ox++) {
        if (fade > 0 && hash2((wx + ox) * 3, y * 5) < fade * 1.2) continue; // dissipa em névoa
        const phase = ((y + frame * 5 + ((ox + 8) & 1) * 3) % 14) / 14;
        put(wx + ox, y, phase < 0.22 ? 9 : phase < 0.55 ? 43 : 48);
      }
      if (fade > 0.15) { // névoa abrindo
        if (hash2(wx * 7, y * 11) < 0.5) put(wx - w2 - 1 - fade * 3, y, 8);
        if (hash2(wx * 13, y * 17) < 0.5) put(wx + w2 + 1 + fade * 3, y, 8);
      }
    }
  }
  // contorno de tinta
  for (let y = 0; y < Hi; y++) for (let x = 0; x < Wi; x++) {
    const v = buf[y * Wi + x];
    if (v < 0 || v === OUTLINE) continue;
    if ((x > 0 && buf[y * Wi + x - 1] < 0) || (x < Wi - 1 && buf[y * Wi + x + 1] < 0) ||
        (y > 0 && buf[(y - 1) * Wi + x] < 0) || (y < Hi - 1 && buf[(y + 1) * Wi + x] < 0)) buf[y * Wi + x] = OUTLINE;
  }
  return bufToTex({ buf, W: Wi, H: Hi });
}

          const nzt = Math.sqrt(Math.max(0, 1 - (nx / rr) * (nx / rr) - nyN * nyN));
          const horiz = Math.sqrt(Math.max(0, 1 - nyN * nyN));
          const bearing = az + Math.atan2(nx / rr, nzt + 1e-4);
          // normal no MUNDO (z = cima) -> luz do sol fixa
          const wnx = horiz * Math.cos(bearing), wny = horiz * Math.sin(bearing), wnz = -nyN;
          const lam = wnx * Math.cos(SUN_AZ) * cosEl + wny * Math.sin(SUN_AZ) * cosEl + wnz * sinEl;
          const facet = Math.floor((fbm(Math.cos(bearing) * 6 + seed, nyN * 6 + seed, 2)) * 3) / 3;
          let tt = 0.5 + 0.46 * lam + (facet - 0.5) * 0.5;
          tt += (BAYER[y & 3][x & 3] / 16 - 0.5) * 0.12;
          const edge = r2 > (rr - 0.09) * (rr - 0.09);
          let idx;
          if (wnz > 0.42 && fbm(Math.cos(bearing) * 4 + seed * 2, nyN * 4, 2) > 0.46) {
            idx = MOSS[clamp(Math.round(tt * 3), 0, 3)]; // musgo no topo
          } else if (edge && lam < 0.05) {
            idx = 1; // contorno escuro no lado à sombra
          } else {
            idx = ROCK[clamp(Math.round(tt * 4), 0, 4)];
          }
          px[y * W + x] = shade(PAL_RGB_U32[idx], f, 0);
        }
      }
      continue;
    }
    if (b.tex === 'orb') {
      /* o Núcleo: esfera procedural pulsante — luz, não parede (D-22: o coração vivo) */
      const cx = (rx0 + rx1) / 2, cy = (y0c + y1c) / 2, rad = sh / 2;
      for (let x = x0; x <= x1; x++) {
        const occY = ty >= zbuf[x] ? wallTop[x] : H;
        for (let y = y0; y <= y1; y++) {
          if (y >= occY) continue;
          const nx = (x - cx) / rad, ny = (y - cy) / rad;
          const r2 = nx * nx + ny * ny;
          if (r2 > 1.15) continue;
          if (r2 > 1) { /* halo fino */
            const base = px[y * W + x];
            px[y * W + x] = shade(base, 1, 0.35 * pulse);
            continue;
          }
          const t = Math.sqrt(r2);
          const hl = Math.max(0, 1 - ((nx + 0.35) ** 2 + (ny + 0.35) ** 2)); /* brilho off-center */
          let r = 60 + 140 * (1 - t) + 90 * hl;
          let g = 30 + 60 * (1 - t) + 80 * hl;
          let bch = 110 + 130 * (1 - t) + 60 * hl;
          const dim = 0.8 + 0.2 * pulse;
          /* dither retrô em anel */
          const band = ((x + y) & 1) === 0 ? 1 : 0.92;
          px[y * W + x] = rgb(clamp(r * dim * band | 0, 0, 255), clamp(g * dim * band | 0, 0, 255), clamp(bch * dim * band | 0, 0, 255));
        }
      }
      continue;
    }
    const selfGlow = b.tex === 'oficina' || b.tex === 'portal' ? 0.16 : 0;
    for (let x = x0; x <= x1; x++) {
      /* parede mais perto? Ela oculta só do TOPO dela pra baixo — acima é
         céu aberto (copas e ilhas atrás de muros aparecem por cima). */
      const occY = ty >= zbuf[x] ? wallTop[x] : H;
      const u = clamp((((x - rx0) / sw) * tw) | 0, 0, tw - 1);
      for (let y = y0; y <= y1; y++) {
        if (y >= occY) continue;
        /* ilha-irmã abaixo do horizonte só aparece onde o chão é vazio */
        if (b.sky && y > HALF && groundMask[y * W + x]) continue;
        const v = clamp((((y - y0c) / sh) * th) | 0, 0, th - 1);
        const c = genTex ? tex.data[v * tw + u] : texAt(tex, fIx, u, v);
        if (((c >> 24) & 255) < 40) continue; /* transparente */
        px[y * W + x] = shade(c, clamp(f + selfGlow, 0, 1), glow + selfGlow * pulse);
      }
    }
  }

  vctx.putImageData(frame, 0, 0);
  drawMinimap();
}

/* ---------- minimapa ---------- */
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');
const MM_COLORS = { m: '#274a2c', f: '#16301c', w: '#1b4956', r: '#4a4258', c: '#a06bf0' };
function drawMinimap() {
  if (!showMap) { mm.style.display = 'none'; return; }
  mm.style.display = 'block';
  for (let y = 0; y < world.h; y++) for (let x = 0; x < world.w; x++) {
    mctx.fillStyle = MM_COLORS[world.at(x, y)];
    mctx.fillRect(x, y, 1, 1);
  }
  mctx.fillStyle = '#fbff86';
  mctx.fillRect((cam.x | 0), (cam.y | 0), 1, 1);
  mctx.strokeStyle = 'rgba(251,255,134,0.6)';
  mctx.beginPath();
  mctx.moveTo(cam.x, cam.y);
  mctx.lineTo(cam.x + Math.cos(cam.a) * 6, cam.y + Math.sin(cam.a) * 6);
  mctx.stroke();
}

/* ---------- movimento ---------- */
const PLAYER_R = 0.14;
function tileSolid(px, py) {
  if (rimAt(px, py) < 0.3) return true; // ninguém cai da ilha (por enquanto)
  const tx = px | 0, ty = py | 0;
  if (blocks(world.at(tx, ty))) return true;
  return rockTiles.has(ty * world.w + tx);
}
/* colisão fina: só o TRONCO (círculo), varrendo o tile do ponto + 8 vizinhos */
function trunkHit(px, py) {
  const tx = px | 0, ty = py | 0;
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    const b = trunkBuckets.get((ty + dy) * world.w + (tx + dx));
    if (!b) continue;
    for (const tr of b) {
      const ex = px - tr.x, ey = py - tr.y, rr = tr.r + PLAYER_R;
      if (ex * ex + ey * ey < rr * rr) return true;
    }
  }
  return false;
}
function tryMove(nx, ny) {
  if (!tileSolid(nx + PLAYER_R, cam.y) && !tileSolid(nx - PLAYER_R, cam.y) && !trunkHit(nx, cam.y)) cam.x = nx;
  if (!tileSolid(cam.x, ny + PLAYER_R) && !tileSolid(cam.x, ny - PLAYER_R) && !trunkHit(cam.x, ny)) cam.y = ny;
}

let touchMove = { on: false, dx: 0, dy: 0 };
let touchLook = { on: false, lastX: 0 };
function bindPad(el, isMove) {
  let sx = 0, sy = 0;
  el.addEventListener('pointerdown', (e) => {
    el.setPointerCapture(e.pointerId);
    sx = e.clientX; sy = e.clientY;
    if (isMove) touchMove = { on: true, dx: 0, dy: 0 };
    else touchLook = { on: true, lastX: e.clientX };
    document.getElementById('hint').classList.add('gone');
  });
  el.addEventListener('pointermove', (e) => {
    if (isMove && touchMove.on) {
      touchMove.dx = clamp((e.clientX - sx) / 60, -1, 1);
      touchMove.dy = clamp((e.clientY - sy) / 60, -1, 1);
    } else if (!isMove && touchLook.on) {
      cam.a += (e.clientX - touchLook.lastX) * 0.006;
      touchLook.lastX = e.clientX;
    }
  });
  const off = () => { if (isMove) touchMove.on = false; else touchLook.on = false; };
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
}
bindPad(document.getElementById('padMove'), true);
bindPad(document.getElementById('padLook'), false);

addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'm') showMap = !showMap;
  document.getElementById('hint').classList.add('gone');
});
addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

/* ---------- loop ---------- */
const hud = document.getElementById('hudTop');
let last = performance.now(), fpsAcc = 0, fpsN = 0, fpsShown = 0;
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  const walk = 3.4 * dt, turn = 2.4 * dt;
  const dirX = Math.cos(cam.a), dirY = Math.sin(cam.a);
  let mx = 0, my = 0;
  if (keys.w || keys.arrowup) { mx += dirX; my += dirY; }
  if (keys.s || keys.arrowdown) { mx -= dirX; my -= dirY; }
  if (keys.a) { mx += dirY; my -= dirX; }
  if (keys.d) { mx -= dirY; my += dirX; }
  if (keys.arrowleft) cam.a -= turn;
  if (keys.arrowright) cam.a += turn;
  if (touchMove.on) {
    mx += dirX * -touchMove.dy + dirY * -touchMove.dx;
    my += dirY * -touchMove.dy - dirX * -touchMove.dx;
  }
  if (mx || my) {
    const n = Math.hypot(mx, my) || 1;
    tryMove(cam.x + (mx / n) * walk, cam.y + (my / n) * walk);
  }
  render(now);
  fpsAcc += 1 / Math.max(dt, 1e-3); fpsN++;
  if (fpsN >= 20) { fpsShown = (fpsAcc / fpsN) | 0; fpsAcc = 0; fpsN = 0; }
  hud.textContent = `${fpsShown} fps · (${cam.x.toFixed(1)}, ${cam.y.toFixed(1)})`;
  requestAnimationFrame(loop);
}

Promise.all(Object.entries(NOS_SPRITES).map(([k, v]) => loadTexture(k, v))).then(() => {
  requestAnimationFrame(loop);
});
</script>
