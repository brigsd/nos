<script>
'use strict';
/* NÓS — gerador de árvores (L-system / ramificação recursiva + copa por campo
   de densidade). Determinístico por seed. Saída: buffer de índices da paleta
   Resurrect 64 (mesma do jogo), -1 = transparente. Núcleo puro, sem DOM —
   serve tanto ao estúdio (artifact) quanto, depois, ao asset do jogo. */

const PALETTE = ["#2e222f","#3e3546","#625565","#966c6c","#ab947a","#694f62","#7f708a","#9babb2","#c7dcd0","#ffffff","#6e2727","#b33831","#ea4f36","#f57d4a","#ae2334","#e83b3b","#fb6b1d","#f79617","#f9c22b","#7a3045","#9e4539","#cd683d","#e6904e","#fbb954","#4c3e24","#676633","#a2a947","#d5e04b","#fbff86","#165a4c","#239063","#1ebc73","#91db69","#cddf6c","#313638","#374e4a","#547e64","#92a984","#b2ba90","#0b5e65","#0b8a8f","#0eaf9b","#30e1b9","#8ff8e2","#323353","#484a77","#4d65b4","#4d9be6","#8fd3ff","#45293f","#6b3e75","#905ea9","#a884f3","#eaaded","#753c54","#a24b6f","#cf657f","#ed8099","#831c5d","#c32454","#f04f78","#f68181","#fca790","#fdcbb0"];

/* ramps: shadow2 -> shadow1 -> mid -> light -> hi (índices da paleta) */
const LEAF_RAMPS = {
  verao:     [29, 30, 31, 32, 33],   // #165a4c..#cddf6c — verde vivo
  outono:    [19, 20, 21, 23, 18],   // vinho..ouro
  primavera: [35, 36, 37, 38, 8],    // teal escuro..menta pálida
  mistica:   [44, 50, 51, 52, 53],   // índigo..lavanda (tema mítico-tecnológico)
  dia:       [29, 30, 31, 32, 27],   // BotW: sombra teal fria -> topo amarelo-verde ao sol
};
const LEAF_SPECK = { verao: 28, outono: 28, primavera: 33, mistica: 43, dia: 28 };  // brilho de folha ao sol / glint ciano
const BARK_RAMPS = {
  quente: [1, 19, 20, 21, 22],   // casca quente (carvalho/ancião)
  fria:   [1, 49, 54, 5, 6],     // casca fria/lilás (mística)
  conif:  [1, 24, 25, 5, 4],     // casca oliva (pinheiro)
  dia:    [1, 24, 3, 4, 63],     // marrom-acinzentado ao sol (ref. BotW)
};

const SPECIES = {
  carvalho:  { len: 22, lenDecay: 0.79, width: 8,  widthDecay: 0.70, spread: 0.54, jitter: 0.34, upBias: 0.06, droop: 0.02, depth: 8, apicalLen: 0.82, latLen: 0.72, lateralN: 2, leafFrom: 3, leafR: [7, 12], gnarl: 0,    bark: 'quente' },
  anciao:    { len: 19, lenDecay: 0.81, width: 12, widthDecay: 0.75, spread: 0.72, jitter: 0.52, upBias: 0.02, droop: 0.05, depth: 7, apicalLen: 0.80, latLen: 0.74, lateralN: 2, leafFrom: 2, leafR: [6, 11], gnarl: 0.55, bark: 'quente' },
  salgueiro: { len: 21, lenDecay: 0.82, width: 6,  widthDecay: 0.73, spread: 0.34, jitter: 0.30, upBias: -0.10, droop: 0.20, depth: 9, apicalLen: 0.84, latLen: 0.74, lateralN: 2, leafFrom: 4, leafR: [4, 7],  gnarl: 0.1,  bark: 'quente' },
  pinheiro:  { len: 15, lenDecay: 0.87, width: 7,  widthDecay: 0.81, spread: 0.95, jitter: 0.20, upBias: 0.0,  droop: 0.30, depth: 9, apicalLen: 0.92, latLen: 0.52, lateralN: 2, leafFrom: 1, leafR: [3, 6],  gnarl: 0,    bark: 'conif' },
};

function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
/* ruído estável por pixel (quebra banding sem parecer chuvisco) */
function hash2(x, y) {
  let h = (x * 374761393 + y * 668265263) >>> 0;
  h = (h ^ (h >>> 13)) * 1274126177;
  return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
}
const BAYER = [
  [0, 8, 2, 10],
  [12, 4, 14, 6],
  [3, 11, 1, 9],
  [15, 7, 13, 5],
];
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);

/**
 * growTree(opts) -> { buf: Int16Array(W*H) de índices da paleta (-1 transp), W, H }
 * opts: { species, mood, seed, W, H, showSkeleton }
 */
function growTree(opts) {
  const S0 = SPECIES[opts.species] || SPECIES.carvalho;
  const mul = opts.sizeMul || 1;
  const S = { ...S0, len: S0.len * mul, width: Math.max(2, S0.width * mul), leafR: [S0.leafR[0] * mul, S0.leafR[1] * mul] };
  const W = opts.W || 104;
  const H = opts.H || 136;
  const rnd = mulberry32((opts.seed | 0) || 1);
  const leafRamp = LEAF_RAMPS[opts.mood] || LEAF_RAMPS.verao;
  const barkRamp = opts.mood === 'mistica' ? BARK_RAMPS.fria : opts.mood === 'dia' ? BARK_RAMPS.dia : BARK_RAMPS[S.bark];
  const speck = LEAF_SPECK[opts.mood] ?? 28;
  const glow = opts.mood === 'mistica';

  const segs = [];
  const leaves = [];
  const baseX = W / 2 + (rnd() - 0.5) * 4;
  const baseY = H - 4;
  const UP = -Math.PI / 2;

  function grow(x, y, ang, len, wid, depth) {
    const x2 = x + Math.cos(ang) * len;
    const y2 = y + Math.sin(ang) * len;
    segs.push({ x1: x, y1: y, x2, y2, w: Math.max(1, wid) });
    const r = S.leafR[0] + rnd() * (S.leafR[1] - S.leafR[0]);
    if (depth <= 0 || len < 2.2) { leaves.push({ x: x2, y: y2, r }); return; }
    if (depth <= S.leafFrom) leaves.push({ x: x2, y: y2, r: r * 0.7 });

    // filho apical: segue quase reto (dominância apical), mais longo
    let aa = ang + (rnd() - 0.5) * S.jitter;
    aa += (UP - aa) * S.upBias;
    grow(x2, y2, aa, len * S.lenDecay * S.apicalLen, wid * S.widthDecay, depth - 1);

    // filhos laterais: abrem em leque, mais curtos
    for (let i = 0; i < S.lateralN; i++) {
      const side = i % 2 === 0 ? 1 : -1;
      let la = ang + side * S.spread + (rnd() - 0.5) * S.jitter * 1.5;
      la += (UP - la) * S.upBias * 0.5;
      la += S.droop; // gravidade / choro
      if (S.gnarl) la += (rnd() - 0.5) * S.gnarl;
      grow(x2, y2, la, len * S.lenDecay * S.latLen, wid * S.widthDecay * 0.82, depth - 1);
    }
  }
  grow(baseX, baseY, UP + (rnd() - 0.5) * 0.1, S.len, S.width, S.depth);

  const buf = new Int16Array(W * H).fill(-1);
  const put = (x, y, idx) => {
    x |= 0; y |= 0;
    if (x < 0 || y < 0 || x >= W || y >= H) return;
    buf[y * W + x] = idx;
  };

  /* ---- casca (segmentos com aresta iluminada) ---- */
  const Lx = -0.55, Ly = -0.83; // luz do alto-esquerda
  for (const s of segs) {
    const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
    const dist = Math.hypot(dx, dy) || 1;
    const ux = dx / dist, uy = dy / dist;      // direção do segmento
    let pxn = -uy, pyn = ux;                    // perpendicular
    const litSign = pxn * Lx + pyn * Ly >= 0 ? 1 : -1; // qual borda pega luz
    const steps = Math.ceil(dist) + 1;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const cx = s.x1 + dx * t, cy = s.y1 + dy * t;
      const halfW = s.w / 2;
      for (let o = -halfW; o <= halfW; o += 0.5) {
        const frac = (o / halfW) * litSign; // -1 borda iluminada .. +1 sombra
        let idx;
        if (frac < -0.35) idx = barkRamp[3];
        else if (frac > 0.45) idx = barkRamp[0];
        else if (frac > 0.1) idx = barkRamp[1];
        else idx = barkRamp[2];
        put(cx + pxn * o, cy + pyn * o, idx);
      }
    }
  }

  if (opts.showSkeleton) {
    for (const lf of leaves) put(lf.x, lf.y, LEAF_SPECK[opts.mood] ?? 28);
    return { buf, W, H };
  }

  /* ---- copa: campo de densidade -> massa coesa iluminada ---- */
  const dens = new Float32Array(W * H);
  let cx = 0, cy = 0, minY = H, maxY = 0;
  for (const lf of leaves) {
    cx += lf.x; cy += lf.y;
    if (lf.y < minY) minY = lf.y;
    if (lf.y > maxY) maxY = lf.y;
    const sig = lf.r / 1.7;
    const inv = 1 / (2 * sig * sig);
    const r = Math.ceil(lf.r);
    for (let oy = -r; oy <= r; oy++) {
      const yy = (lf.y + oy) | 0;
      if (yy < 0 || yy >= H) continue;
      for (let ox = -r; ox <= r; ox++) {
        const xx = (lf.x + ox) | 0;
        if (xx < 0 || xx >= W) continue;
        const d2 = ox * ox + oy * oy;
        if (d2 > r * r) continue;
        dens[yy * W + xx] += Math.exp(-d2 * inv);
      }
    }
  }
  cx /= leaves.length || 1; cy /= leaves.length || 1;
  const canopyH = Math.max(8, maxY - minY);

  // alguns "buracos" pra luz atravessar (profundidade)
  const holes = 3 + (rnd() * 3 | 0);
  for (let k = 0; k < holes; k++) {
    const lf = leaves[(rnd() * leaves.length) | 0];
    if (!lf) continue;
    const hr = lf.r * (0.7 + rnd() * 0.5);
    const sig = hr / 1.6, inv = 1 / (2 * sig * sig), r = Math.ceil(hr);
    const hx = lf.x + (rnd() - 0.5) * lf.r, hy = lf.y + (rnd() - 0.5) * lf.r;
    for (let oy = -r; oy <= r; oy++) {
      const yy = (hy + oy) | 0; if (yy < 0 || yy >= H) continue;
      for (let ox = -r; ox <= r; ox++) {
        const xx = (hx + ox) | 0; if (xx < 0 || xx >= W) continue;
        dens[yy * W + xx] -= 0.75 * Math.exp(-(ox * ox + oy * oy) * inv);
      }
    }
  }

  const THR = 0.42;
  const isLeaf = (x, y) => x >= 0 && y >= 0 && x < W && y < H && dens[y * W + x] > THR;
  const last = leafRamp.length - 1;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (dens[y * W + x] <= THR) continue;
      const gx = (dens[y * W + Math.min(W - 1, x + 1)] - dens[y * W + Math.max(0, x - 1)]);
      const gy = (dens[Math.min(H - 1, y + 1) * W + x] - dens[Math.max(0, y - 1) * W + x]);
      const gm = Math.hypot(gx, gy) || 1e-4;
      const ox = -gx / gm, oy = -gy / gm;   // normal apontando pra fora
      const lam = ox * Lx + oy * Ly;         // -1 (sombra) .. 1 (luz)
      const lift = (cy - y) / (canopyH * 0.6); // topo mais claro
      const sunBoost = opts.mood === 'dia' ? 1.25 : 1;
      let t = 0.46 + 0.42 * sunBoost * lam + 0.13 * lift + (hash2(x, y) - 0.5) * 0.10;
      t += (BAYER[y & 3][x & 3] / 16 - 0.5) * 0.22; // dither ordenado
      let idx = clamp(Math.round(t * last), 0, last);

      // rim: borda da silhueta
      const boundary = !isLeaf(x - 1, y) || !isLeaf(x + 1, y) || !isLeaf(x, y - 1) || !isLeaf(x, y + 1);
      if (boundary) {
        if (lam < -0.05) buf[y * W + x] = leafRamp[0];         // contorno escuro contra o void
        else if (lam > 0.45) buf[y * W + x] = leafRamp[last];  // aresta brilhando
        else buf[y * W + x] = leafRamp[idx];
        continue;
      }
      // brilho pontual (folha pegando sol)
      if (lam > 0.32 && hash2(x + 7, y + 13) < 0.045) idx = last;
      buf[y * W + x] = leafRamp[Math.max(idx, 0)];
      // glint místico (índice de brilho) esparso
      if (glow && lam > 0.4 && hash2(x + 31, y + 17) < 0.03) buf[y * W + x] = speck;
    }
  }
  return { buf, W, H, glow };
}


/* ================= CENA DIURNA (ref. BotW -> Resurrect 64) ================= */

/* fBm 2D barato sobre hash2 (value noise) */
function vnoise(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const fx = x - xi, fy = y - yi;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hash2(xi, yi), b = hash2(xi + 1, yi), c = hash2(xi, yi + 1), d = hash2(xi + 1, yi + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}
function fbm(x, y, oct) {
  let v = 0, amp = 0.5, f = 1;
  for (let i = 0; i < oct; i++) { v += amp * vnoise(x * f, y * f); amp *= 0.5; f *= 2; }
  return v;
}

/* céu: gradiente azul + cúmulos com base achatada + montanha na bruma + linha de mata */
function genSky(opts) {
  const W = opts.W || 480, H = opts.H || 120;
  const seed = (opts.seed | 0) || 1;
  const rnd = mulberry32(seed);
  const off = rnd() * 512;
  const buf = new Int16Array(W * H);
  // rampa vertical: skyBlue 47 -> paleBlue 48 -> paleMint 8 -> branco no horizonte
  for (let y = 0; y < H; y++) {
    const t = y / H;
    for (let x = 0; x < W; x++) {
      const dth = (BAYER[y & 3][x & 3] / 16 - 0.5) * 0.10;
      const tt = t + dth;
      buf[y * W + x] = tt < 0.42 ? 47 : tt < 0.74 ? 48 : tt < 0.92 ? 8 : 9;
    }
  }
  // cúmulos: fBm + recorte, achatando a base (multiplica por rampa vertical local)
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const n = fbm(x / 46 + off, y / 26 + off * 2, 4);
      const band = Math.sin((y / H) * Math.PI); // nuvens vivem no meio do céu
      const v = n * (0.55 + 0.45 * band);
      if (v > 0.56) {
        const topLight = fbm(x / 46 + off, (y - 3) / 26 + off * 2, 4) < v;
        buf[y * W + x] = v > 0.66 ? 9 : topLight ? 9 : y / H > 0.55 ? 7 : 48;
      }
    }
  }
  if (opts.mountain !== false) {
    // maciço distante na bruma: 2 cristas assimétricas, sólido, base hazed
    // crista de trás: fantasma na bruma
    const back = { mx: W * (0.40 + rnd() * 0.06), mw: W * (0.16 + rnd() * 0.05), peak: H * (0.62 + rnd() * 0.06), skew: 0.7 + rnd() * 0.4 };
    // maciço da frente: modesto, sólido
    const front = { mx: W * (0.56 + rnd() * 0.08), mw: W * (0.20 + rnd() * 0.05), peak: H * (0.50 + rnd() * 0.08), skew: 0.6 + rnd() * 0.5 };
    for (let x = 0; x < W; x++) {
      let dxb = (x - back.mx) / back.mw;
      dxb = dxb < 0 ? -dxb * back.skew : dxb;
      if (dxb <= 1) {
        const ridge = back.peak + (H - back.peak) * Math.pow(dxb, 1.7) + (fbm(x / 16 + off * 9, 3, 3) - 0.5) * 6;
        for (let y = Math.max(0, ridge | 0); y < H; y++) {
          const dth = BAYER[y & 3][x & 3] / 16;
          buf[y * W + x] = dth < 0.45 ? 6 : dth < 0.8 ? 7 : 48; // silhueta afogada na bruma
        }
      }
    }
    for (let x = 0; x < W; x++) {
      let dx = (x - front.mx) / front.mw;
      dx = dx < 0 ? -dx * front.skew : dx;
      if (dx > 1) continue;
      const ridge = front.peak + (H - front.peak) * Math.pow(dx, 1.7) + (fbm(x / 13 + off * 3, 7, 3) - 0.5) * 8;
      for (let y = Math.max(0, ridge | 0); y < H; y++) {
        const depth = (y - ridge) / Math.max(1, H - ridge);
        const dth = BAYER[y & 3][x & 3] / 16;
        const nearBase = y > H - 7;
        let idx;
        if (depth < 0.2) idx = dth < 0.5 ? 3 : 19;          // cume pega sol
        else idx = dth < 0.8 ? 19 : 5;                       // corpo vinho sólido
        if (nearBase) idx = dth < 0.45 ? 5 : dth < 0.8 ? 6 : 48; // só a base afunda na bruma
        buf[y * W + x] = idx;
      }
    }
  }
  // linha de mata ao fundo, hazed (últimas linhas)
  for (let x = 0; x < W; x++) {
    const h = 4 + fbm(x / 9 + off * 5, 7, 3) * 8;
    for (let y = H - (h | 0); y < H; y++) {
      buf[y * W + x] = (BAYER[y & 3][x & 3] / 16) < 0.55 ? 30 : 37;
    }
  }
  return { buf, W, H };
}

/* rocha: blob convexo deformado por ruído, sombreado por normal quantizada + topo de musgo */
function genRock(opts) {
  const seed = (opts.seed | 0) || 1;
  const rnd = mulberry32(seed);
  const W = opts.W || 56, H = opts.H || 40;
  const buf = new Int16Array(W * H).fill(-1);
  const cx = W / 2, cy = H * 0.62;
  const rx = W * (0.34 + rnd() * 0.1), ry = H * (0.3 + rnd() * 0.08);
  const off = rnd() * 128;
  const rad = (ang) => 1 + 0.34 * (vnoise(Math.cos(ang) * 1.4 + off, Math.sin(ang) * 1.4 + off) - 0.5) * 2;
  const inside = (x, y) => {
    const ang = Math.atan2((y - cy) / ry, (x - cx) / rx);
    const rr = rad(ang);

      const eps = 1.2;
      const dl = inside(x - eps, y), dr = inside(x + eps, y);
      const du = inside(x, y - eps), dd = inside(x, y + eps);
      const nx = (dr < 0 ? 1.4 : dr) - (dl < 0 ? 1.4 : dl);
      const ny = (dd < 0 ? 1.4 : dd) - (du < 0 ? 1.4 : du);
      const nm = Math.hypot(nx, ny) || 1e-4;
      const lam = (-nx / nm) * -0.55 + (-ny / nm) * -0.83; // luz alto-esquerda
      const facet = fbm(x / 7 + off, y / 7 + off, 3);       // facetas internas
      let t = 0.55 + 0.5 * lam + (facet - 0.5) * 0.55;
      t += (BAYER[y & 3][x & 3] / 16 - 0.5) * 0.18;

      const upness = -ny / nm;

      buf[y * W + x] = RAMP[clamp(Math.round(t * 4), 0, 4)];
    }
  }
  return { buf, W, H };
}

/* grama diurna v2: base viva + PINCELADAS direcionais (lâminas deitadas na

function genGrassTile(seed, flowery) {
  const rnd = mulberry32(seed * 7919 + 13);

  // respiração sutil da base (manchas 1 passo mais claras)
  for (let y = 0; y < TEX; y++) for (let x = 0; x < TEX; x++) {
    if (vnoise(x / 5 + seed * 11, y / 5 - seed * 3) > 0.70) buf[y * TEX + x] = 33;
  }
  // pinceladas: traços de 2-4px na diagonal do vento (\), tons acima/abaixo
  const strokes = 14 + (rnd() * 6) | 0;
  for (let i = 0; i < strokes; i++) {
    const sx = (rnd() * TEX) | 0, sy = (rnd() * TEX) | 0;
    const len = 2 + (rnd() * 3) | 0;
    const tone = rnd() < 0.45 ? 31 : rnd() < 0.75 ? 27 : 33;
    for (let k = 0; k < len; k++) {
      const x = (sx + k) & (TEX - 1), y = (sy - (k >> 1) + TEX) & (TEX - 1);
      buf[y * TEX + x] = tone;

  const clumps = 2 + (rnd() * 2) | 0;

/* tufo de graminha (objeto): lâminas em arco a partir da base; `lean` -1..1
   inclina as pontas — 3 frames por variante viram o balanço do vento */
function genTuft(seed, lean, flowery) {

  const rnd = mulberry32(seed * 104729 + 7);
  const buf = new Int16Array(Wt * Ht).fill(-1);
  const put = (x, y, idx) => { x |= 0; y |= 0; if (x >= 0 && y >= 0 && x < Wt && y < Ht) buf[y * Wt + x] = idx; };
  const blades = 6 + (rnd() * 4) | 0;

    const bend = fan * 3 + lean * (2.2 + len * 0.22); // vento empurra as pontas
    const tone = rnd() < 0.3 ? 30 : rnd() < 0.72 ? 31 : 32;
    const tip = rnd() < 0.35 ? 27 : 32;
    for (let k = 0; k <= len; k++) {
      const t = k / len;
      const x = bx + bend * t * t;
      const y = baseY - k * 0.92;
      put(x, y, t > 0.72 ? tip : tone);
      if (t < 0.3) put(x + 1, y, tone); // base mais grossa

/* céu panorâmico diurno em CAMADAS: base estática (gradiente+maciço) e
   duas camadas de cúmulos com parallax — longe deriva devagar, perto mais
   rápido; a montanha é marco do mundo e fica PARADA. */
const SKY_W = 1024, SKY_H = HALF;
const SKY_BASE = new Uint32Array(SKY_W * SKY_H);
const CLOUD_FAR = new Uint32Array(SKY_W * SKY_H);  // alpha 0 = furo
const CLOUD_NEAR = new Uint32Array(SKY_W * SKY_H);
{
  const px32 = (r, g, b) => (255 << 24) | (b << 16) | (g << 8) | r;
  const lerp = (a, b, t) => a + (b - a) * t;
  const mix = (c1, c2, t) => px32(lerp(c1[0], c2[0], t) | 0, lerp(c1[1], c2[1], t) | 0, lerp(c1[2], c2[2], t) | 0);
  const C = { 47: [77,155,230], 48: [143,211,255], 8: [199,220,208], 9: [255,255,255], 7: [155,171,178], 19: [122,48,69], 3: [150,108,108], 5: [105,79,98], 6: [127,112,138] };
  /* base: gradiente liso */
  for (let y = 0; y < SKY_H; y++) {
    const t = y / SKY_H;
    const row = t < 0.5 ? mix(C[47], C[48], t / 0.5) : t < 0.85 ? mix(C[48], C[8], (t - 0.5) / 0.35) : mix(C[8], C[9], (t - 0.85) / 0.15);
    for (let x = 0; x < SKY_W; x++) SKY_BASE[y * SKY_W + x] = row;
  }
  /* maciço fixo no rumo leste */
  const mx = SKY_W * 0.25, mw = SKY_W * 0.075, peak = SKY_H * 0.44;
  for (let x = 0; x < SKY_W; x++) {
    let dx = (x - mx) / mw; dx = dx < 0 ? -dx * 0.7 : dx;
    if (dx > 1) continue;
    const ridge = peak + (SKY_H - peak) * Math.pow(dx, 1.7) + (fbm(x / 13, 7, 3) - 0.5) * 8;
    for (let y = Math.max(0, ridge | 0); y < SKY_H; y++) {
      const depth = (y - ridge) / Math.max(1, SKY_H - ridge);
      const hazeT = Math.max(0, (y - (SKY_H - 10)) / 10);

      SKY_BASE[y * SKY_W + x] = mix(c, C[8], Math.max(hazeT, depth > 0.85 ? 0.35 : 0));
    }
  }

     3 tons — topo branco, barriga azul-pálida, base cinza (ref. BotW) */
  function stampCloud(layer, rnd, cx, cy, w, h, faint) {
    const n = 6 + (rnd() * 4) | 0;
    const puffs = [];
    for (let i = 0; i < n; i++) {

      const centerBoost = 1 - Math.abs(t - 0.5) * 1.25; // miolo bem mais alto que as pontas
      puffs.push({
        px: cx + (t - 0.5) * w * 0.92 + (rnd() - 0.5) * w * 0.05,
        py: cy - h * (0.10 + 0.44 * centerBoost) - rnd() * h * 0.10,

  const rn = mulberry32(4242);
  for (let i = 0; i < 5; i++) stampCloud(CLOUD_NEAR, rn, rn() * SKY_W, 22 + rn() * 30, 90 + rn() * 110, 22 + rn() * 14, false);

/* clamp: já declarado pelo gerador acima */
const rgb = (r, g, b) => (255 << 24) | (b << 16) | (g << 8) | r;

/* bruma diurna (paleMint da referência) — a distância derrete em luz, não em breu */
const FOG_R = 199, FOG_G = 220, FOG_B = 208;
function shade(c, f, glow) {
  let r = (c & 255) * f + FOG_R * (1 - f) + 96 * glow;
  let g = ((c >> 8) & 255) * f + FOG_G * (1 - f) + 52 * glow;
  let b = ((c >> 16) & 255) * f + FOG_B * (1 - f) + 140 * glow;
  return rgb(clamp(r | 0, 0, 255), clamp(g | 0, 0, 255), clamp(b | 0, 0, 255));

const fogAt = (d) => 1 / (1 + 0.0085 * d * d); /* bruma diurna suave — objetos legíveis a média distância */
let pulse = 1;
function glowAt(wx, wy) {
  const dx = wx - CORE.x, dy = wy - CORE.y;
  return (pulse * 0.6) / (1 + 0.32 * (dx * dx + dy * dy));
}

/* ---------- render ---------- */
const zbuf = new Float32Array(W);

function render(now) {
  pulse = 0.82 + 0.18 * Math.sin((now / 1400) * Math.PI * 2);
  const coreFrame = ((now / 350) | 0) % 4;
  const waterFrame = ((now / 1000) | 0) % 2;
  const dirX = Math.cos(cam.a), dirY = Math.sin(cam.a);
  const plX = -dirY * FOV_PLANE, plY = dirX * FOV_PLANE;

  const driftNear = (now * 0.0052) % SKY_W;  // camada baixa ~3x mais rápida
  for (let x = 0; x < W; x++) {
    const colAng = cam.a + Math.atan(((2 * x) / W - 1) * FOV_PLANE);
    const u = ((colAng / (Math.PI * 2)) % 1 + 1) % 1;
    const sxB = (u * SKY_W) | 0;
    const sxF = ((u * SKY_W + driftFar) | 0) % SKY_W;
    const sxN = ((u * SKY_W + driftNear) | 0) % SKY_W;
    for (let y = 0; y < HALF; y++) {
      let c = SKY_BASE[y * SKY_W + sxB];
      const cf = CLOUD_FAR[y * SKY_W + sxF];
      if (cf !== 0) c = cf;
      const cn = CLOUD_NEAR[y * SKY_W + sxN];
      if (cn !== 0) c = cn;

    const rowDist = posZ / (y - HALF);

    const stepX = rowDist * (2 * FOV_PLANE * dirY) / W * (dirX ? 1 : 1);
    /* pontos extremos do raio esquerdo/direito nessa linha */
    let fx = cam.x + rowDist * (dirX - plX);
    let fy = cam.y + rowDist * (dirY - plY);
    const dxs = (rowDist * 2 * plX) / W;
    const dys = (rowDist * 2 * plY) / W;
    for (let x = 0; x < W; x++) {
      const tx = fx | 0, ty = fy | 0;
      const t = world.at(tx, ty);
      let c;
      if (t === 'w') {
        const tex = textures.agua;
        c = texAt(tex, waterFrame, ((fx - tx) * TEX) | 0, ((fy - ty) * TEX) | 0);
      } else {
        const h = ((tx * 73856093) ^ (ty * 19349663)) >>> 0;

    let mapX = cam.x | 0, mapY = cam.y | 0;
    const ddx = Math.abs(1 / (rdx || 1e-9)), ddy = Math.abs(1 / (rdy || 1e-9));
    let stepX, stepY, sdx, sdy;
    if (rdx < 0) { stepX = -1; sdx = (cam.x - mapX) * ddx; } else { stepX = 1; sdx = (mapX + 1 - cam.x) * ddx; }
    if (rdy < 0) { stepY = -1; sdy = (cam.y - mapY) * ddy; } else { stepY = 1; sdy = (mapY + 1 - cam.y) * ddy; }
    let side = 0, tile = 'f', guard = 0;
    while (guard++ < 128) {
      if (sdx < sdy) { sdx += ddx; mapX += stepX; side = 0; } else { sdy += ddy; mapY += stepY; side = 1; }
      tile = world.at(mapX, mapY);
      if (isWall(tile)) break;
    }
    const dist = side === 0 ? sdx - ddx : sdy - ddy;
    zbuf[x] = dist;
    const lineH = (H / dist) | 0;
    let y0 = clamp(HALF - (lineH >> 1), 0, H - 1);
    let y1 = clamp(HALF + (lineH >> 1), 0, H - 1);
    let wallX = side === 0 ? cam.y + dist * rdy : cam.x + dist * rdx;
    wallX -= wallX | 0;
    const u = clamp((wallX * TEX) | 0, 0, TEX - 1);
    const tex = tile === 'c' ? textures.nucleo : tile === 'r' ? textures.ruina : textures.floresta;
    const fIx = tile === 'c' ? coreFrame : 0;
    const f = fogAt(dist) * (side === 1 ? 0.78 : 1);
    const hx = mapX + 0.5, hy = mapY + 0.5;
    const glow = tile === 'c' ? 0.45 * pulse : glowAt(hx, hy) * f;
    const texStep = TEX / lineH;
    let texPos = (y0 - HALF + (lineH >> 1)) * texStep;
    for (let y = y0; y <= y1; y++) {
      const v = clamp(texPos | 0, 0, TEX - 1);
      texPos += texStep;
      const c = texAt(tex, fIx, u, v);
      px[y * W + x] = tile === 'c'
        ? shade(c, clamp(f + 0.5, 0, 1), glow)  /* o Núcleo emite: quase sem fog */
        : shade(c, f, glow);
    }
  }

  /* billboards (longe -> perto), cull por distância — a bruma esconde o pop-in */
  const CULL2 = 34 * 34;
  const near = [];
  for (const b of bills) {
    const d = (b.x - cam.x) ** 2 + (b.y - cam.y) ** 2;
    if (d < CULL2) near.push({ b, d });
  }
  near.sort((a, z) => a.d - z.d);
  const order = near.slice(0, 190).sort((a, z) => z.d - a.d);
  const inv = 1 / (plX * dirY - dirX * plY);
  for (const { b } of order) {
    const rx = b.x - cam.x, ry = b.y - cam.y;
    const tx = inv * (dirY * rx - dirX * ry);
    const ty = inv * (-plY * rx + plX * ry);
    if (ty <= 0.15) continue;
    const sx = ((W / 2) * (1 + tx / ty)) | 0;
    let genTex = b.gen;
    if (b.genFrames) {
      // vento: seno com fase própria — cada tufo no seu tempo, sem "coreografia"
      const k = (Math.sin(now / 620 + b.phase) + 1) / 2;
      genTex = b.genFrames[Math.round(k * (b.genFrames.length - 1))];
    }
    const tex = genTex ?? textures[b.tex];
    const tw = genTex ? genTex.w : TEX, th = genTex ? genTex.h : TEX;
    const unit = Math.abs(H / ty);
    const sh = (unit * (b.scale || 1)) | 0;
    const sw = (sh * (tw / th)) | 0;
    const bottom = HALF + unit * 0.5 - unit * (b.lift || 0);
    const fIx = b.frames > 1 ? ((now / 700) | 0) % b.frames : 0;
    const f = fogAt(ty);
    const glow = glowAt(b.x, b.y) * f;
    const y0c = bottom - sh, y1c = bottom;
    const rx0 = sx - (sw >> 1), rx1 = sx + (sw >> 1);
    if (rx1 < 0 || rx0 >= W || y1c < 0 || y0c >= H) continue; /* 100% fora da tela */
    const y0 = clamp(y0c | 0, 0, H - 1), y1 = clamp(y1c | 0, 0, H - 1);
    const x0 = clamp(rx0, 0, W - 1), x1 = clamp(rx1, 0, W - 1);
    if (b.tex === 'orb') {
      /* o Núcleo: esfera procedural pulsante — luz, não parede (D-22: o coração vivo) */
      const cx = (rx0 + rx1) / 2, cy = (y0c + y1c) / 2, rad = sh / 2;
      for (let x = x0; x <= x1; x++) {
        if (ty >= zbuf[x]) continue;
        for (let y = y0; y <= y1; y++) {
          const nx = (x - cx) / rad, ny = (y - cy) / rad;
          const r2 = nx * nx + ny * ny;
          if (r2 > 1.15) continue;
          if (r2 > 1) { /* halo fino */
            const base = px[y * W + x];
            px[y * W + x] = shade(base, 1, 0.35 * pulse);
            continue;
          }
          const t = Math.sqrt(r2);
          const hl = Math.max(0, 1 - ((nx + 0.35) ** 2 + (ny + 0.35) ** 2)); /* brilho off-center */
          let r = 60 + 140 * (1 - t) + 90 * hl;
          let g = 30 + 60 * (1 - t) + 80 * hl;
          let bch = 110 + 130 * (1 - t) + 60 * hl;
          const dim = 0.8 + 0.2 * pulse;
          /* dither retrô em anel */
          const band = ((x + y) & 1) === 0 ? 1 : 0.92;
          px[y * W + x] = rgb(clamp(r * dim * band | 0, 0, 255), clamp(g * dim * band | 0, 0, 255), clamp(bch * dim * band | 0, 0, 255));
        }
      }
      continue;
    }
    const selfGlow = b.tex === 'oficina' || b.tex === 'portal' ? 0.16 : 0;
    for (let x = x0; x <= x1; x++) {
      if (ty >= zbuf[x]) continue;
      const u = clamp((((x - rx0) / sw) * tw) | 0, 0, tw - 1);
      for (let y = y0; y <= y1; y++) {
        const v = clamp((((y - y0c) / sh) * th) | 0, 0, th - 1);
        const c = genTex ? tex.data[v * tw + u] : texAt(tex, fIx, u, v);
        if (((c >> 24) & 255) < 40) continue; /* transparente */
        px[y * W + x] = shade(c, clamp(f + selfGlow, 0, 1), glow + selfGlow * pulse);
      }
    }
  }

  vctx.putImageData(frame, 0, 0);
  drawMinimap();
}

/* ---------- minimapa ---------- */
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');
const MM_COLORS = { m: '#274a2c', f: '#16301c', w: '#1b4956', r: '#4a4258', c: '#a06bf0' };
function drawMinimap() {
  if (!showMap) { mm.style.display = 'none'; return; }
  mm.style.display = 'block';
  for (let y = 0; y < world.h; y++) for (let x = 0; x < world.w; x++) {
    mctx.fillStyle = MM_COLORS[world.at(x, y)];
    mctx.fillRect(x, y, 1, 1);
  }
  mctx.fillStyle = '#fbff86';
  mctx.fillRect((cam.x | 0), (cam.y | 0), 1, 1);
  mctx.strokeStyle = 'rgba(251,255,134,0.6)';
  mctx.beginPath();
  mctx.moveTo(cam.x, cam.y);
  mctx.lineTo(cam.x + Math.cos(cam.a) * 6, cam.y + Math.sin(cam.a) * 6);
  mctx.stroke();
}

/* ---------- movimento ---------- */
function blockedAt(x, y) {
  if (blocks(world.at(x, y))) return true;
  return typeof rockTiles !== 'undefined' && rockTiles.has(y * world.w + x);
}
function tryMove(nx, ny) {
  const R = 0.22;
  if (!blockedAt((nx + R) | 0, cam.y | 0) && !blockedAt((nx - R) | 0, cam.y | 0)) cam.x = nx;
  if (!blockedAt(cam.x | 0, (ny + R) | 0) && !blockedAt(cam.x | 0, (ny - R) | 0)) cam.y = ny;
}

let touchMove = { on: false, dx: 0, dy: 0 };
let touchLook = { on: false, lastX: 0 };
function bindPad(el, isMove) {
  let sx = 0, sy = 0;
  el.addEventListener('pointerdown', (e) => {
    el.setPointerCapture(e.pointerId);
    sx = e.clientX; sy = e.clientY;
    if (isMove) touchMove = { on: true, dx: 0, dy: 0 };
    else touchLook = { on: true, lastX: e.clientX };
    document.getElementById('hint').classList.add('gone');
  });
  el.addEventListener('pointermove', (e) => {
    if (isMove && touchMove.on) {
      touchMove.dx = clamp((e.clientX - sx) / 60, -1, 1);
      touchMove.dy = clamp((e.clientY - sy) / 60, -1, 1);
    } else if (!isMove && touchLook.on) {
      cam.a += (e.clientX - touchLook.lastX) * 0.006;
      touchLook.lastX = e.clientX;
    }
  });
  const off = () => { if (isMove) touchMove.on = false; else touchLook.on = false; };
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
}
bindPad(document.getElementById('padMove'), true);
bindPad(document.getElementById('padLook'), false);

addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'm') showMap = !showMap;
  document.getElementById('hint').classList.add('gone');
});
addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

/* ---------- loop ---------- */
const hud = document.getElementById('hudTop');
let last = performance.now(), fpsAcc = 0, fpsN = 0, fpsShown = 0;
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  const walk = 3.4 * dt, turn = 2.4 * dt;
  const dirX = Math.cos(cam.a), dirY = Math.sin(cam.a);
  let mx = 0, my = 0;
  if (keys.w || keys.arrowup) { mx += dirX; my += dirY; }
  if (keys.s || keys.arrowdown) { mx -= dirX; my -= dirY; }
  if (keys.a) { mx += dirY; my -= dirX; }
  if (keys.d) { mx -= dirY; my += dirX; }
  if (keys.arrowleft) cam.a -= turn;
  if (keys.arrowright) cam.a += turn;
  if (touchMove.on) {
    mx += dirX * -touchMove.dy + dirY * -touchMove.dx;
    my += dirY * -touchMove.dy - dirX * -touchMove.dx;
  }
  if (mx || my) {
    const n = Math.hypot(mx, my) || 1;
    tryMove(cam.x + (mx / n) * walk, cam.y + (my / n) * walk);
  }
  render(now);
  fpsAcc += 1 / Math.max(dt, 1e-3); fpsN++;
  if (fpsN >= 20) { fpsShown = (fpsAcc / fpsN) | 0; fpsAcc = 0; fpsN = 0; }
  hud.textContent = `${fpsShown} fps · (${cam.x.toFixed(1)}, ${cam.y.toFixed(1)})`;
  requestAnimationFrame(loop);
}

Promise.all(Object.entries(NOS_SPRITES).map(([k, v]) => loadTexture(k, v))).then(() => {
  requestAnimationFrame(loop);
});
</script>
