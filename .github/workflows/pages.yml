name: Deploy Atelier to Pages

# Publica SÓ o Atelier (o cliente v3 + a Oficina) em /fps/v3/, preservando a URL.
# As demos (Clareira 2D + Miragem raycaster) migraram pro brigsd/nos-mentes (D-110);
# o mundo 2D (site/, engine/, world/) não é mais publicado daqui.
on:
  push:
    branches: [ main ]
    paths:
      - 'prototipos/fps/v3/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Montar o site (só o Atelier, em /fps/v3/)
        run: |
          mkdir -p _site/fps/v3
          cp -R prototipos/fps/v3/. _site/fps/v3/
          touch _site/.nojekyll
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>NÓS — Atelier</title>
          <meta http-equiv="refresh" content="0; url=./fps/v3/jogo.html">
          <style>body{background:#0b0e14;color:#cdd3e0;font:15px/1.6 system-ui,sans-serif;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px}a{color:#a884f3}</style>
          </head><body><p>NÓS — Atelier. Indo pro <a href="./fps/v3/jogo.html">jogo</a>… · <a href="https://brigsd.github.io/nos-mentes/">demos (Clareira / Miragem)</a></p></body></html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
