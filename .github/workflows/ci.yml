name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm run test

      - name: Lint Sprites
        run: npm run lint:sprites

      - name: Validate World State
        run: npm run validate-world

      - name: Mapa do repositório em dia
        run: npm run mapa:check

      - name: Índice da oficina em dia
        run: npm run docs:toc:check

      - name: Build and Typecheck Site Client
        run: |
          cd site
          npm ci
          npm run typecheck
          npm run build
