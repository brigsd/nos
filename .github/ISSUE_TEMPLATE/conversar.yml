name: "Comando: /conversar"
description: "Puxar conversa com um Nativo d'O Coração"
title: "Comando: /conversar"
labels: ["comando"]
body:
  - type: markdown
    attributes:
      value: |
        ### Conversar com um Nativo

        Chegue a até **3 tiles** de um Nativo e puxe conversa. Não custa energia.
        A resposta vem na próxima batida — aqui na issue e no Mural do mundo.

        Nativos d'O Coração: `gota` (colhe e mistura o que o rio larga), `raiz` (mercadora da floresta) e `cinza` (mestra da pedra, nas ruínas).
  - type: input
    id: nativo
    attributes:
      label: "Nativo"
      description: "O id do Nativo com quem conversar"
      placeholder: "gota"
    validations:
      required: true
